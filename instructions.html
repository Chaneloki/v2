<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Excel 魔法冒險 - 冒險指南</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            background: #0b0b14 url('BG/intro/1_bg.png') no-repeat center center fixed;
            background-size: cover;
            display: flex;
            justify-content: center;
            align-items: center;
            height: auto;
            min-height: 100vh;
            overflow-y: auto;
            padding: 40px 20px;
        }
        .instruction-book {
            width: 100%;
            max-width: 800px;
            background: #287e8b48; /* Parchment color */
            border: 12px double #209e9c45;
            border-radius: 15px;
            padding: 40px;
            box-shadow: 0 0 50px rgba(0,0,0,0.8);
            color: #3e2723;
            position: relative;
        }
        h1 {
            text-align: center;
            color: #150ee1;
            font-family: serif;
            font-size: 36px;
            margin-bottom: 30px;
            border-bottom: 2px solid #d2b48c;
            padding-bottom: 10px;
        }
        h2 {
            color: #2f2173a8;
            border-left: 5px solid #2f2173a8;
            padding-left: 15px;
            margin-top: 30px;
        }
        p, li {
            font-size: 18px;
            line-height: 1.8;
            color: #000000
        }
        .guide-section {
            margin-bottom: 40px;
        }
        .btn-back {
            display: inline-block;
            margin-top: 30px;
            padding: 12px 25px;
            background: #209e9ca4;
            color: #fdf5e6;
            text-decoration: none;
            border-radius: 8px;
            font-weight: bold;
            transition: 0.3s;
        }
        .btn-back:hover {
            background: #2538c1;
            transform: scale(1.05);
        }
        /* Feedback Form Styles */
        #feedback-form {
            background: rgba(139, 69, 19, 0.05);
            padding: 25px;
            border-radius: 10px;
            border: 1px dashed #d2b48c;
            margin-top: 40px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            font-weight: bold;
            margin-bottom: 8px;
            color: #2f2173a8;
        }
        input[type="text"], textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #d2b48c;
            border-radius: 5px;
            background: #fff;
            box-sizing: border-box;
            font-size: 16px;
        }
        textarea {
            height: 120px;
            resize: vertical;
        }
        .btn-submit {
            background: #21734681;
            color: #fff;
            border: none;
            padding: 12px 30px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 18px;
            font-weight: bold;
            transition: 0.3s;
        }
        .btn-submit:hover {
            background: #1cd171;
        }
        .btn-submit:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        #success-msg {
            display: none;
            font-weight: bold;
            margin-top: 15px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="instruction-book">
        <h1>📜 試算表魔導書：冒險指南</h1>

        <div class="guide-section">
            <h2>💡 冒險小提示</h2>
            <p>記得隨時存檔！</p>
        </div>

        <div id="feedback-section">
            <h2>💬 冒險者回饋</h2>
            <p>我們非常重視你的冒險體驗。如果你有任何建議或發現了Bug，請告訴我們！</p>
            <form id="feedback-form">
                <div class="form-group">
                    <label for="p-name">冒險者大名：</label>
                    <input type="text" id="p-name" placeholder="請輸入你的稱呼..." required>
                </div>
                <div class="form-group">
                    <label for="p-comment">你的留言：</label>
                    <textarea id="p-comment" placeholder="寫下你的冒險心得或建議..." required></textarea>
                </div>
                <button type="submit" class="btn-submit">傳送魔法訊息</button>
                <div id="success-msg"></div>
            </form>
        </div>

        <a href="index.html" class="btn-back">⬅️ 回到冒險起點</a>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
    <script src="code/firebase-config.js"></script>
    <script>
        document.getElementById('feedback-form').addEventListener('submit', function(e) {
            e.preventDefault();
            const name = document.getElementById('p-name').value;
            const comment = document.getElementById('p-comment').value;
            const submitBtn = this.querySelector('.btn-submit');
            const successMsg = document.getElementById('success-msg');
            const form = this;

            submitBtn.disabled = true;

            const writePromise = window.db.collection(window.FEEDBACK_COLLECTION).add({
                name,
                comment,
                date: new Date().toLocaleString(),
                timestamp: firebase.firestore.FieldValue.serverTimestamp()
            });
            const timeoutPromise = new Promise((_, reject) => {
                setTimeout(() => reject(new Error('timeout')), 8000);
            });

            Promise.race([writePromise, timeoutPromise]).then(() => {
                successMsg.textContent = '✨ 訊息已成功傳送到大魔導師的手中！感謝你的回饋。';
                successMsg.style.color = '#217346';
                successMsg.style.display = 'block';
                form.reset();
            }).catch((err) => {
                console.error('Feedback submit failed:', err);
                successMsg.textContent = '⚠️ 傳送失敗了！請確認網路連線後再試一次魔法。';
                successMsg.style.color = '#b22222';
                successMsg.style.display = 'block';
            }).finally(() => {
                submitBtn.disabled = false;
                setTimeout(() => {
                    successMsg.style.display = 'none';
                }, 3000);
            });
        });
    </script>
</body>
</html>
