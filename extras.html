        function deleteSortLevel() {
            if (_sortLevels && _sortLevels.length > 1) {
                const row = _sortLevels.pop();
                row.remove();
            }
        }

        function handleSortOrderChange(selectEl, idx) {
            if (selectEl.value === 'custom') {
                _activeSortOrderSelect = selectEl;
                openFormatDialog('customlist');
                selectEl.value = 'desc'; 
            }
        }

        function confirmSortDialog() {
            const levels = [];
            const rows = document.querySelectorAll('#sort-levels-body tr');
            rows.forEach(row => {
                const colSelect = row.querySelector('.sort-col');
                const orderSelect = row.querySelector('.sort-order');
                if (colSelect && orderSelect) {
                    const col = parseInt(colSelect.value);
                    const order = orderSelect.value;
                    levels.push({ col, order });
                }
            });

            executeComplexSort(levels);
            closeSortDialog();
        }

        function executeComplexSort(levels) {
            const rows = practiceState.displayRows;
            const customOrder = currentTask.scenario.customOrder; 
            
            rows.sort((a, b) => {
                for (let i = 0; i < levels.length; i++) {
                    const { col, order } = levels[i];
                    let valA = a[col];
                    let valB = b[col];
                    
                    if (order === 'custom_done') {
                        const idxA = customOrder.indexOf(valA);
                        const idxB = customOrder.indexOf(valB);
                        if (idxA !== -1 && idxB !== -1) {
                            if (idxA !== idxB) return idxA - idxB;
                        } else if (idxA !== -1) {
                            return -1;
                        } else if (idxB !== -1) {
                            return 1;
                        }
                    } else {
                        const isDesc = order === 'desc';
                        if (typeof valA === 'number' && typeof valB === 'number') {
                            if (valA !== valB) return isDesc ? valB - valA : valA - valB;
                        } else {
                            const cmp = String(valA).localeCompare(String(valB), 'zh-Hant');
                            if (cmp !== 0) return isDesc ? -cmp : cmp;
                        }
                    }
                }
                return 0;
            });

            renderTask();
            
            if (currentTask.skillId === 'SORT_MULTI' || currentTask.skillId === 'SORT_CUSTOM') {
                let correct = true;
                for (let i = 0; i < rows.length - 1; i++) {
                    const idxA = customOrder.indexOf(rows[i][3]);
                    const idxB = customOrder.indexOf(rows[i+1][3]);
                    if (idxA > idxB) {
                        correct = false;
                        break;
                    }
                }
                if (correct) {
                    showFeedback(true);
                } else {
                    showFeedbackMessage(false, "❌ 排序順序與自訂清單不符！請設定為自訂清單排序。");
                }
            }
        }

        function addCustomListFromUI() {
            const textarea = document.getElementById('excel-custom-entries');
            const pane = document.getElementById('excel-custom-lists-pane');
            if (!textarea || !pane) return;

            const lines = textarea.value.split('\n').map(l => l.trim()).filter(l => l !== "");
            if (lines.length === 0) {
                alert("請輸入清單項目！");
                return;
            }

            const expected = currentTask.scenario.customOrder;
            const isMatch = expected.length > 0 && expected.every(e => lines.includes(e));

            if (isMatch) {
                const newItem = document.createElement('div');
                newItem.className = 'category-item';
                newItem.innerText = lines.join(', ');
                newItem.onclick = (e) => {
                    pane.querySelectorAll('.category-item').forEach(item => item.classList.remove('active'));
                    newItem.classList.add('active');
                    _selectedCustomList = lines;
                };
                pane.appendChild(newItem);
                
                textarea.value = ""; 
                alert("清單已成功新增！現在請在左側選取該清單並按確定。");
            } else {
                alert(`排序序列不符合邏輯（提示：需要包含 ${expected.join('、')}）`);
            }
        }

        function closeSubtotalDialog() {
            const modal = document.getElementById('ch5-subtotal-modal');
            if (modal) modal.style.display = 'none';
        }

        function confirmSubtotalDialog() {
            const groupCol = parseInt(document.getElementById('subtotal-group-col').value, 10);
            const chks = document.querySelectorAll('.subtotal-sum-chk');
            let sumCol = -1;
            chks.forEach(chk => {
                if (chk.checked) sumCol = parseInt(chk.value, 10);
            });

            closeSubtotalDialog();
            
            const rows = practiceState.displayRows;
            if (rows.length === 0) return;

            let isSorted = true;
            for (let i = 0; i < rows.length - 1; i++) {
                if (String(rows[i][groupCol]).localeCompare(String(rows[i+1][groupCol]), 'zh-Hant') > 0) {
                    isSorted = false;
                    break;
                }
            }
            
            if (!isSorted) {
                showFeedbackMessage(false, `❌ 請先按「${currentTask.table.header[groupCol]}」欄進行升序排序，否則小計無法正確分組！`);
                return;
            }
            
            const newData = [];
            let lastGroup = rows[0][groupCol];
            let subtotal = 0;
            let grandTotal = 0;
            const highlightRows = [];
            
            for (let i = 0; i < rows.length; i++) {
                if (rows[i][groupCol] !== lastGroup) {
                    const subRow = Array(currentTask.table.header.length).fill("");
                    subRow[groupCol] = lastGroup + " 總計";
                    subRow[sumCol] = subtotal;
                    highlightRows.push(newData.length);
                    newData.push(subRow);
                    grandTotal += subtotal;
                    lastGroup = rows[i][groupCol];
                    subtotal = 0;
                }
                newData.push(rows[i]);
                subtotal += Number(rows[i][sumCol]) || 0;
            }
            
            const finalSubRow = Array(currentTask.table.header.length).fill("");
            finalSubRow[groupCol] = lastGroup + " 總計";
            finalSubRow[sumCol] = subtotal;
            highlightRows.push(newData.length);
            newData.push(finalSubRow);
            grandTotal += subtotal;
            
            const grandTotalRow = Array(currentTask.table.header.length).fill("");
            grandTotalRow[groupCol] = "總計";
            grandTotalRow[sumCol] = grandTotal;
            highlightRows.push(newData.length);
            newData.push(grandTotalRow);
            
            practiceState.displayRows = newData;
            practiceState.outlineEnabled = true;
            practiceState.outlineVisible = true;
            
            if (!practiceState.cellHighlights) practiceState.cellHighlights = {};
            highlightRows.forEach(rIdx => {
                for (let c = 0; c < currentTask.table.header.length; c++) {
                    practiceState.cellHighlights[`${rIdx}-${c}`] = { backgroundColor: '#f2f2f2', color: '#000', fontWeight: 'bold' };
                }
            });
            
            renderTask();

            if (currentTask.skillId === 'SUBTOTAL') {
                const correctGroupCol = currentTask.correctAnswer.groupCol;
                const correctSumCol = currentTask.correctAnswer.sumCol;
                if (groupCol === correctGroupCol && sumCol === correctSumCol) {
                    showFeedback(true);
                } else {
                    showFeedbackMessage(false, `❌ 小計參數設定與任務要求不符！`);
                }
            }
        }

        function openFilterDropdown(event, colIdx) {
            event.stopPropagation();
            event.preventDefault();
            
            const existing = document.getElementById('excel-filter-dropdown');
            if (existing) existing.remove();
            
            const rect = event.target.getBoundingClientRect();
            const dropdown = document.createElement('div');
            dropdown.id = 'excel-filter-dropdown';
            dropdown.style.cssText = `position: fixed; top: ${rect.bottom + window.scrollY}px; left: ${rect.left + window.scrollX}px; width: 180px; background: #fff; border: 1px solid #ccc; box-shadow: 0 4px 10px rgba(0,0,0,0.15); z-index: 10500; font-family: sans-serif; font-size: 12px; color: #333; display: flex; flex-direction: column;`;
            
            const rows = currentTask.table.rows;
            const uniqueVals = [...new Set(rows.map(r => r[colIdx]))].sort();
            
            let checklistHtml = uniqueVals.map(val => {
                const isChecked = !practiceState.filteredOutVals || !practiceState.filteredOutVals.includes(val);
                return `<label style="display: flex; align-items: center; gap: 5px; padding: 4px 8px; cursor: pointer;">
                    <input type="checkbox" class="filter-chk" value="${escapeHtmlAttr(val)}" ${isChecked ? 'checked' : ''}> ${val}
                </label>`;
            }).join('');
            
            dropdown.innerHTML = `
                <div style="padding: 6px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; font-weight: bold; background: #f5f5f5;">
                    <span>篩選設定</span>
                    <span onclick="this.parentElement.parentElement.remove()" style="cursor:pointer;">✕</span>
                </div>
                <div style="max-height: 150px; overflow-y: auto; padding: 5px;">
                    ${checklistHtml}
                </div>
                <div style="padding: 6px; border-top: 1px solid #eee; text-align: right; background: #f5f5f5;">
                    <button onclick="confirmFilterDropdown(${colIdx})" style="font-size: 11px; padding: 2px 8px; border: 1px solid #888; background: #eee; cursor: pointer;">確定</button>
                </div>
            `;
            
            document.body.appendChild(dropdown);
        }

        function confirmFilterDropdown(colIdx) {
            const chks = document.querySelectorAll('.filter-chk');
            const checkedVals = [];
            const uncheckedVals = [];
            chks.forEach(chk => {
                if (chk.checked) checkedVals.push(chk.value);
                else uncheckedVals.push(chk.value);
            });
            
            practiceState.filteredOutVals = uncheckedVals;
            
            const allRows = currentTask.table.rows;
            practiceState.displayRows = allRows.filter(row => {
                const val = String(row[colIdx]);
                return !uncheckedVals.includes(val);

            renderTask();
            
            const dropdown = document.getElementById('excel-filter-dropdown');
            if (dropdown) dropdown.remove();
            
            if (currentTask.skillId === 'FILTER' && currentTask.colIdx === colIdx) {
                if (checkedVals.length === 1 && checkedVals[0] === currentTask.correctAnswer) {
                    showFeedback(true);

                }
            }
        }

                        <span>樞紐分析表欄位清單</span>

        function renderDropArea(label, key, data) {
            return `
                <div class="pivot-area-box" ondragover="onPivotDragOver(event)" ondragleave="onPivotDragLeave(event)" ondrop="onPivotDrop(event, '${key}')">
                    <div class="pivot-area-title"><span>${label}</span></div>
                    <div class="pivot-area-list">

                            <div class="pivot-tag">

                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
        }

        function onPivotDragStart(e, f) { e.dataTransfer.setData("text/plain", f); }
        function onPivotDragOver(e) { e.preventDefault(); e.currentTarget.classList.add('drag-over'); }
        function onPivotDragLeave(e) { e.currentTarget.classList.remove('drag-over'); }
        function onPivotDrop(e, key) {
            e.preventDefault(); 
            const f = e.dataTransfer.getData("text/plain"); 
            e.currentTarget.classList.remove('drag-over');
            
            ["rows", "cols", "vals"].forEach(k => _pivotState[k] = _pivotState[k].filter(item => item !== f));
            _pivotState[key].push(f); 
            renderPivotSetupUI();
        }

        function removePivotField(key, f) {
            _pivotState[key] = _pivotState[key].filter(keyVal => keyVal !== f); 
            renderPivotSetupUI();
        }

        function closePivotSetupDialog() {
            const modal = document.getElementById('ch6-pivot-setup-modal');
            if (modal) modal.style.display = 'none';
        }

        function confirmPivotSetup() {
            closePivotSetupDialog();
            
            const s = _pivotState;
            if (currentTask.skillId === 'PIVOT_CREATE') {
                const correctRow = currentTask.correctAnswer.row;
                const correctVal = currentTask.correctAnswer.val;
                
                if (s.rows.includes(correctRow) && s.vals.includes(correctVal)) {
                    generatePivotTableData();
                    showFeedback(true);
                } else {
                    showFeedbackMessage(false, `❌ 請將「${correctRow}」拖曳至【列】，並將「${correctVal}」拖曳至【值】區域！`);
                }
            } else if (currentTask.skillId === 'PIVOT_GROUP') {
                generatePivotTableData();
                showFeedbackMessage(true, "✨ 樞紐分析表已生成！請右鍵點選「月份」（如 三月）儲存格，選擇【組成群組】。");
            }
        }

        function generatePivotTableData() {
            const headers = ["列標籤", "加總 - " + currentTask.table.header[4]];
            const categoryIdx = 2;
            const valueIdx = 4;
            const rows = currentTask.table.rows;
            
            const summary = {};
            rows.forEach(r => {
                let key = r[categoryIdx];
                if (currentTask.skillId === 'PIVOT_GROUP') {
                    const dateStr = r[7];
                    const m = parseInt(dateStr.split('/')[1]);
                    if (_pivotState.isGrouped) {
                        if (m <= 3) key = "第一季";
                        else if (m <= 6) key = "第二季";
                        else if (m <= 9) key = "第三季";
                        else key = "第四季";
                    } else {
                        const months = ["一月", "二月", "三月", "四月", "五月", "六月", "七月", "八月", "九月", "十月", "十一月", "十二月"];
                        key = months[m - 1];
                    }
                }
                
                summary[key] = (summary[key] || 0) + (Number(r[valueIdx]) || 0);
            });
            
            const pivotRows = [];
            let grandTotal = 0;
            Object.keys(summary).sort().forEach(key => {
                pivotRows.push([key, summary[key]]);
                grandTotal += summary[key];
            });
            pivotRows.push(["總計", grandTotal]);
            
            practiceState.displayRows = pivotRows;
            currentTask.table.header = headers; 
            
            renderTask();
        }

                    <div class="excel-dialog-header" style="background:#fff; padding:8px 12px; display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid #ddd; font-size:13px; font-weight:bold;">

        function checkAnswer() {
            const t = currentTask;
            const PE = window.PracticeEngine;
            let isCorrect = false;
            
            const FORMULA_SKILLS = ['SUM', 'AUTOFILL', 'IF_CONCAT', 'FORMULA_BASIC', 'REF_RELATIVE', 'FUNC_SUM_MULTI', 'IF_BASIC', 'IFS', 'IF_AND', 'IF_PLUS', 'REF_ABSOLUTE', 'FUNC_RANK', 'COMPARE_OP', 'TEXT_TO_NUM'];
            const isFormulaSkill = FORMULA_SKILLS.includes(t.skillId);

            if (t.uiType === 'single') {
                const input = document.getElementById('single-answer');
                const raw = input ? input.value.trim() : '';

                if (isFormulaSkill) {
                    if (!raw.startsWith('=')) {
                        showFeedbackMessage(false, '❌ 請使用等號 = 開頭的公式進行計算，不要直接輸入數值！');
                        if (input) {
                            input.classList.remove('ok');
                            input.classList.add('fail');
                        }
                        return;
                    }
                    const result = PE.evaluateFormula(raw, t.table);
                    isCorrect = PE.answersMatch(result, t.correctAnswer);
                } else {
                    isCorrect = PE.answersMatch(raw, t.correctAnswer);
                }
                
                if (input) {
                    input.classList.toggle('ok', isCorrect);
                    input.classList.toggle('fail', !isCorrect);
                }
            } else if (t.uiType === 'column') {
                let allOk = true;
                let anyNonFormula = false;
                let anyNoAbsolute = false;

                t.table.rows.forEach((row, i) => {
                    const input = document.getElementById('ans-' + i);
                    const raw = input ? input.value.trim() : '';

                    if (isFormulaSkill) {
                        if (!raw.startsWith('=')) {
                            anyNonFormula = true;
                        }
                        if (t.skillId === 'REF_ABSOLUTE' && (!raw.includes('$') || !raw.toUpperCase().includes('K'))) {
                            anyNoAbsolute = true;
                        }
                        if (t.skillId === 'FUNC_RANK' && !raw.includes('$')) {
                            anyNoAbsolute = true;
                        }
                    }

                    const result = PE.evaluateFormula(raw, t.table);
                    const ok = PE.answersMatch(result, t.correctAnswer[i]);
                    if (input) {
                        input.classList.toggle('ok', ok);
                        input.classList.toggle('fail', !ok);
                    }
                    if (!ok) allOk = false;
                });

                if (anyNonFormula) {
                    showFeedbackMessage(false, '❌ 請使用等號 = 開頭的公式進行計算，不要直接輸入數值！');
                    return;
                }
                if (anyNoAbsolute) {
                    if (t.skillId === 'REF_ABSOLUTE') {
                        showFeedbackMessage(false, '❌ 鎖定倍率錯誤：請使用絕對引用（如 $K$2）鎖定倍率儲存格！');
                    } else if (t.skillId === 'FUNC_RANK') {
                        showFeedbackMessage(false, '❌ 鎖定範圍錯誤：RANK 的比對範圍參數必須使用絕對引用（如 $E$2:$E$10）鎖定！');
                    }
                    return;
                }

                isCorrect = allOk;
            } else if (t.uiType === 'sort') {
                const correctOrder = t.table.rows.slice().sort((a, b) =>
                    t.sortDir === 'desc' ? b[t.sortCol] - a[t.sortCol] : a[t.sortCol] - b[t.sortCol]);
                isCorrect = practiceState.displayRows.every((row, i) => row[0] === correctOrder[i][0]);
            } else if (t.uiType === 'toggle') {
                isCorrect = (practiceState.frozen === true);
            } else if (t.skillId === 'MERGE_CENTER') {
                isCorrect = (practiceState.mergedRange && practiceState.mergedRange.minRow === -1 && practiceState.mergedRange.maxRow === -1 && practiceState.mergedRange.minCol === 0 && practiceState.mergedRange.maxCol === 7);
            } else if (t.skillId === 'BORDER') {
                isCorrect = practiceState.hasBorders === true;
            } else if (t.skillId === 'FILL_COLOR') {
                isCorrect = practiceState.hasHeaderFill === true;
            } else if (t.skillId === 'FORMAT') {
                isCorrect = practiceState.painterApplied === true;
            } else if (t.skillId === 'VALIDATION') {
                isCorrect = practiceState.validationApplied === true;
            } else if (t.skillId === 'SUBTOTAL') {
                const lastRow = practiceState.displayRows[practiceState.displayRows.length - 1];
                isCorrect = lastRow && lastRow[t.correctAnswer.groupCol] === "總計";
            } else if (t.skillId === 'PIVOT_CREATE') {
                isCorrect = currentTask.table.header[0] === "列標籤";
            } else if (t.skillId === 'PIVOT_GROUP') {
                isCorrect = _pivotState.isGrouped === true;
            } else if (t.skillId === 'OUTLINE') {
                isCorrect = practiceState.outlineVisible === true;
            } else if (t.skillId === 'SORT_MULTI' || t.skillId === 'SORT_CUSTOM') {
                const customOrder = currentTask.scenario.customOrder;
                let correct = true;
                for (let i = 0; i < practiceState.displayRows.length - 1; i++) {
                    const idxA = customOrder.indexOf(practiceState.displayRows[i][3]);
                    const idxB = customOrder.indexOf(practiceState.displayRows[i+1][3]);
                    if (idxA > idxB) {
                        correct = false;
                        break;
                    }
                }
                isCorrect = correct;
            } else if (t.skillId === 'SEARCH') {
                isCorrect = practiceState.searchFound === true;
            }

            showFeedback(isCorrect);
        }

        function showFeedback(ok) {
            showFeedbackMessage(ok, ok ? '✅ 正確！這招你學會了。' : '❌ 還不太對，再試一次，或點開上面的提示看看？');
        }

        function showFeedbackMessage(ok, msg) {
            practiceState.feedback = { ok: ok, msg: msg };
            const el = document.getElementById('task-feedback-container');
            if (el) {
                el.className = 'task-feedback ' + (ok ? 'ok' : 'fail');
                el.innerText = msg;
            }
        }

        // ========================================================
        // 互動邏輯：多選、公式拖拽填滿、單擊帶入公式與 F4 絕對引用
        // ========================================================
        
        function escapeHtmlAttr(str) {
            if (!str) return '';
            return String(str).replace(/&/g, '&amp;')
                              .replace(/"/g, '&quot;')
                              .replace(/'/g, '&#39;')
                              .replace(/</g, '&lt;')
                              .replace(/>/g, '&gt;');
        }

        function adjustInputWidth(input) {
            if (document.activeElement !== input) return;
            const parentWidth = input.parentElement ? input.parentElement.clientWidth : 150;
            const charCount = input.value.length;
            const estimatedWidth = Math.max(parentWidth, charCount * 7.5 + 24);
            input.style.width = estimatedWidth + 'px';
        }

        function onInputChange(e, idx) {
            if (idx === 'single') {
                practiceState.singleInputValue = e.target.value;
            } else {
                if (!practiceState.inputValues) practiceState.inputValues = {};
                practiceState.inputValues[idx] = e.target.value;
            }
            adjustInputWidth(e.target);
        }

        function updateActiveInputValue(val) {
            if (!practiceState.activeInput) return;
            const input = practiceState.activeInput;
            if (input.id === 'single-answer') {
                practiceState.singleInputValue = val;
            } else if (input.id.startsWith('ans-')) {
                const idx = parseInt(input.id.replace('ans-', ''), 10);
                if (!isNaN(idx)) {
                    if (!practiceState.inputValues) practiceState.inputValues = {};
                    practiceState.inputValues[idx] = val;
                }
            }
            adjustInputWidth(input);
        }

        function onInputFocus(e, rIdx) {
            const input = e.target;
            practiceState.activeInput = input;
            
            // 設定當前選擇為該輸入框對應的儲存格
            const colIdx = currentTask.uiType === 'column' ? currentTask.table.header.length : 2;
            practiceState.selectedCell = { r: rIdx, c: colIdx };
            practiceState.selectedCol = -1;
            practiceState.selectedRange = null;
            
            // 移除可能存在的自動填滿拉柄
            document.querySelectorAll('.fill-handle').forEach(fh => fh.remove());
            
            // 更新視覺框線
            updateRangeHighlight();
            
            // 如果是 column 模式且是 ans- 輸入框，在其父層 cell 加入拉柄
            if (currentTask.uiType === 'column' && input.id.startsWith('ans-')) {
                const parentCell = input.parentElement;
                const fillHandle = document.createElement('div');
                fillHandle.className = 'fill-handle';
                fillHandle.onmousedown = (event) => onFillHandleMouseDown(event, rIdx);
                parentCell.appendChild(fillHandle);
            }

            // 讓輸入框在輸入長公式時可以向右伸展覆蓋鄰近儲存格
            const parent = input.parentElement;
            if (parent) {
                parent.style.overflow = 'visible';
                parent.style.zIndex = '100';
            }
            input.style.position = 'absolute';
            input.style.left = '0';
            input.style.top = '0';
            input.style.zIndex = '100';
            input.style.height = '100%';
            input.style.textAlign = 'left';
            input.style.background = '#fff';
            input.style.boxShadow = 'inset 0 0 0 2px #217346, 0 4px 12px rgba(0,0,0,0.12)';
            adjustInputWidth(input);
        }

        function onInputBlur(e) {
            const input = e.target;
            const parent = input.parentElement;
            if (parent) {
                parent.style.overflow = '';
                parent.style.zIndex = '';
            }
            input.style.position = '';
            input.style.left = '';
            input.style.top = '';
            input.style.zIndex = '';
            input.style.height = '';
            input.style.width = '';
            input.style.textAlign = '';
            input.style.background = '';
            input.style.boxShadow = '';
        }

        function onCellMouseDown(e, rIdx, cIdx) {
            if (e.button !== 0) return; // 僅限滑鼠左鍵
            
            // 如果目前有正在輸入公式（以 = 開頭）的輸入框，則點擊格子會自動引用該格子
            if (practiceState.activeInput && practiceState.activeInput.value.startsWith('=')) {
                e.preventDefault(); // 阻止焦點轉移
                const input = practiceState.activeInput;
                
                practiceState.isDraggingFormulaRange = true;
                practiceState.dragStartCell = { r: rIdx, c: cIdx };
                
                const text = input.value;
                const start = input.selectionStart;
                const end = input.selectionEnd;
                
                let baseText = text.substring(0, start);
                const endText = text.substring(end);
                
                // 若游標前方字元非運算子且是英文字母/數字，則預設加上 "+"
                let prefix = "";
                if (baseText.length > 0) {
                    const lastChar = baseText.charAt(baseText.length - 1);
                    if (!['+', '-', '*', '/', '(', ',', '=', ':', ' '].includes(lastChar) && /^[a-zA-Z0-9]$/.test(lastChar)) {
                        prefix = "+";
                    }
                }
                practiceState.formulaDragBaseText = baseText + prefix;
                practiceState.formulaDragEndText = endText;
                
                const targetAddr = colLetter(cIdx) + (rIdx + 2);
                input.value = practiceState.formulaDragBaseText + targetAddr + practiceState.formulaDragEndText;
                
                const cursorIdx = practiceState.formulaDragBaseText.length + targetAddr.length;
                input.setSelectionRange(cursorIdx, cursorIdx);
                
                updateActiveInputValue(input.value);
                
                // 設定選取範圍高亮
                practiceState.selectedRange = { minRow: rIdx, maxRow: rIdx, minCol: cIdx, maxCol: cIdx };
                updateRangeHighlight();
            } else {
                // 一般框選拖曳
                practiceState.isDraggingRange = true;
                practiceState.dragStartCell = { r: rIdx, c: cIdx };
                practiceState.selectedCell = { r: rIdx, c: cIdx };
                practiceState.selectedCol = -1;
                practiceState.selectedRange = { minRow: rIdx, maxRow: rIdx, minCol: cIdx, maxCol: cIdx };
                updateRangeHighlight();
            }
        }

        function onCellMouseOver(e, rIdx, cIdx) {
            if (practiceState.isDraggingFormulaRange) {
                const input = practiceState.activeInput;
                if (!input) return;
                
                const minR = Math.min(practiceState.dragStartCell.r, rIdx);
                const maxR = Math.max(practiceState.dragStartCell.r, rIdx);
                const minC = Math.min(practiceState.dragStartCell.c, cIdx);
                const maxC = Math.max(practiceState.dragStartCell.c, cIdx);
                
                let rangeStr = "";
                if (minR === maxR && minC === maxC) {
                    rangeStr = colLetter(minC) + (minR + 2);
                } else {
                    rangeStr = colLetter(minC) + (minR + 2) + ":" + colLetter(maxC) + (maxR + 2);
                }
                
                input.value = practiceState.formulaDragBaseText + rangeStr + practiceState.formulaDragEndText;
                const cursorIdx = practiceState.formulaDragBaseText.length + rangeStr.length;
                input.setSelectionRange(cursorIdx, cursorIdx);
                
                updateActiveInputValue(input.value);
                
                practiceState.selectedRange = { minRow: minR, maxRow: maxR, minCol: minC, maxCol: maxC };
                updateRangeHighlight();
            } else if (practiceState.isDraggingRange) {
                const minR = Math.min(practiceState.dragStartCell.r, rIdx);
                const maxR = Math.max(practiceState.dragStartCell.r, rIdx);
                const minC = Math.min(practiceState.dragStartCell.c, cIdx);
                const maxC = Math.max(practiceState.dragStartCell.c, cIdx);
                
                practiceState.selectedRange = { minRow: minR, maxRow: maxR, minCol: minC, maxCol: maxC };
                updateRangeHighlight();
            }
        }

        function updateRangeHighlight() {
            const selCell = practiceState.selectedCell;
            const selRange = practiceState.selectedRange;
            const selCol = practiceState.selectedCol;
            
            // Update column header letters
            document.querySelectorAll('#practice-grid .letter').forEach(letter => {
                const c = parseInt(letter.getAttribute('data-col'), 10);
                if (isNaN(c)) return;
                const isSelected = selCol === c;
                letter.classList.toggle('l-sel', isSelected);
                if (isSelected) {
                    letter.style.setProperty('background', 'rgba(33, 115, 70, 0.15)', 'important');
                } else {
                    letter.style.background = '';
                }
            });
            
            document.querySelectorAll('#practice-grid .cell').forEach(cell => {
                if (cell.classList.contains('letter')) return;
                
                const r = parseInt(cell.getAttribute('data-row'), 10);
                const c = parseInt(cell.getAttribute('data-col'), 10);
                if (isNaN(r) || isNaN(c)) return;
                
                const isSelectedCol = selCol === c;
                cell.classList.toggle('l-sel', isSelectedCol);
                
                let inRange = false;
                let shadows = [];
                
                if (selRange) {
                    const minR = selRange.minRow;
                    const maxR = selRange.maxRow;
                    const minC = selRange.minCol;
                    const maxC = selRange.maxCol;
                    
                    if (r >= minR && r <= maxR && c >= minC && c <= maxC) {
                        inRange = true;
                        if (r === minR) shadows.push('inset 0 2px 0 0 #217346');
                        if (r === maxR) shadows.push('inset 0 -2px 0 0 #217346');
                        if (c === minC) shadows.push('inset 2px 0 0 0 #217346');
                        if (c === maxC) shadows.push('inset -2px 0 0 0 #217346');
                    }
                } else if (selCell && selCell.r === r && selCell.c === c) {
                    shadows.push('inset 0 2px 0 0 #217346', 'inset 0 -2px 0 0 #217346', 'inset 2px 0 0 0 #217346', 'inset -2px 0 0 0 #217346');
                }
                
                cell.classList.toggle('range-selected', inRange);
                cell.classList.toggle('selected', selCell && selCell.r === r && selCell.c === c);
                
                // Adjust background color dynamically based on column selection
                if (isSelectedCol) {
                    cell.style.setProperty('background-color', 'rgba(33, 115, 70, 0.08)', 'important');
                } else {
                    if (r === -1) { // Row 1 Category Cell
                        if (practiceState.hasHeaderFill) {
                            cell.style.setProperty('background-color', '#fce4d6', 'important');
                        } else {
                            cell.style.backgroundColor = '#f8f9fa';
                        }
                    } else { // Normal Data Cell
                        const highlight = (practiceState.cellHighlights && practiceState.cellHighlights[`${r}-${c}`]);
                        if (highlight) {
                            cell.style.setProperty('background-color', highlight.backgroundColor, 'important');
                        } else if (currentTask.skillId === 'FORMAT' && (r === 0 || practiceState.painterApplied)) {
                            cell.style.setProperty('background-color', '#fff9c4', 'important');
                        } else {
                            cell.style.backgroundColor = '';
                        }
                    }
                }
                
                if (shadows.length > 0) {
                    const isRow2Frozen = practiceState.frozen && r === 0;
                    let extraShadow = "";
                    if (isRow2Frozen) {
                        extraShadow = ", inset 0 -2px 0 0 #217346";
                    }
                    cell.style.setProperty('box-shadow', shadows.join(', ') + extraShadow, 'important');
                    cell.style.zIndex = '5';
                } else {
                    const isRow2Frozen = practiceState.frozen && r === 0;
                    if (isRow2Frozen) {
                        cell.style.setProperty('box-shadow', 'inset 0 -2px 0 0 #217346', 'important');
                    } else {
                        cell.style.boxShadow = '';
                    }
                    cell.style.zIndex = '';
                }
            });
        }

        // F4 絕對/相對參照切換
        function onInputKeyDown(e, rIdx) {
            if (e.key === 'F4') {
                e.preventDefault();
                const input = e.target;
                const text = input.value;
                const offset = input.selectionStart;
                const regex = /\$?[A-Za-z]+\$?\d+/g;
                let match;
                let targetMatch = null;
                while ((match = regex.exec(text)) !== null) {
                    const start = match.index;
                    const end = match.index + match[0].length;
                    if (offset >= start && offset <= end) {
                        targetMatch = match;
                        break;
                    }
                }
                if (targetMatch) {
                    const ref = targetMatch[0];
                    const start = targetMatch.index;
                    const end = start + ref.length;
                    const colMatch = ref.match(/\$?([A-Za-z]+)/);
                    const rowMatch = ref.match(/\$?(\d+)/);
                    const isColAbs = colMatch[0].startsWith('$');
                    const isRowAbs = rowMatch[0].startsWith('$');
                    const col = colMatch[1].toUpperCase();
                    const row = rowMatch[1];

                    let nextRef = ref;
                    if (!isColAbs && !isRowAbs) nextRef = `$${col}$${row}`;
                    else if (isColAbs && isRowAbs) nextRef = `${col}$${row}`;
                    else if (!isColAbs && isRowAbs) nextRef = `$${col}${row}`;
                    else nextRef = `${col}${row}`;

                    const newText = text.substring(0, start) + nextRef + text.substring(end);
                    input.value = newText;
                    
                    const diff = nextRef.length - ref.length;
                    input.setSelectionRange(offset + diff, offset + diff);
                    
                    updateActiveInputValue(newText);
                }
            }
        }

        // 自動填滿拖曳 (Autofill Handle)
        function onFillHandleMouseDown(e, rIdx) {
            e.preventDefault();
            e.stopPropagation();
            practiceState.isDraggingFill = true;
            practiceState.dragSourceIdx = rIdx;
            practiceState.dragCurrentRowIdx = rIdx;
            updateFillDragHighlight();
        }

        function onAnswerCellMouseOver(e, rIdx) {
            if (practiceState.isDraggingFill) {
                practiceState.dragCurrentRowIdx = rIdx;
                updateFillDragHighlight();
            }
        }

        function updateFillDragHighlight() {
            const start = practiceState.dragSourceIdx;
            const end = practiceState.dragCurrentRowIdx;
            if (start === undefined || end === undefined) return;
            const min = Math.min(start, end);
            const max = Math.max(start, end);
            
            document.querySelectorAll('.cell.answer-col').forEach((c, idx) => {
                c.classList.remove('fill-drag-target');
                if (practiceState.isDraggingFill && idx >= min && idx <= max) {
                    c.classList.add('fill-drag-target');
                }
            });
        }

        function adjustFormulaForAutofill(formula, sourceRowIdx, targetRowIdx) {
            if (!formula.startsWith('=')) return formula; // 非公式原樣複製
            const delta = targetRowIdx - sourceRowIdx;
            
            return formula.replace(/(\$?[A-Za-z]+)(\$?(\d+))/g, (match, colPart, rowPart, rowNumStr) => {
                if (rowPart.startsWith('$')) {
                    return colPart + rowPart; // 鎖定行號，不改變
                } else {
                    const rowNum = parseInt(rowNumStr, 10);
                    const newRowNum = rowNum + delta;
                    return colPart + Math.max(1, newRowNum); // 調整相對參照的行號
                }
            });
        }

        function makeWidgetDraggable() {
            const widget = document.getElementById('trial-floating-widget');
            const handle = document.getElementById('widget-drag-handle');
            if (!widget || !handle) return;
            
            let mouseX = 0, mouseY = 0, curTop = 0, curLeft = 0;

            handle.addEventListener('mousedown', dragStart);
            handle.addEventListener('touchstart', dragStart, { passive: false });

            function dragStart(e) {
                if (e.target.classList.contains('widget-toggle-btn')) {
                    return;
                }

                // free-floating uses position:fixed (viewport-relative), so the
                // widget can be dragged anywhere on screen, not just inside the
                // simulated Excel window. Unlike position:absolute, a fixed element's
                // box is NOT rescaled by the page's CSS zoom, so top/left here track
                // clientX/clientY 1:1 with no zoom conversion.
                const widgetRect = widget.getBoundingClientRect();
                if (!widget.classList.contains('free-floating')) {
                    widget.classList.add('free-floating');
                }
                curTop = widgetRect.top;
                curLeft = widgetRect.left;
                widget.style.top = curTop + "px";
                widget.style.left = curLeft + "px";
                widget.style.right = "auto";

                const clientX = e.type === 'touchstart' ? e.touches[0].clientX : e.clientX;
                const clientY = e.type === 'touchstart' ? e.touches[0].clientY : e.clientY;

                e.preventDefault();
                mouseX = clientX;
                mouseY = clientY;

                if (e.type === 'mousedown') {
                    document.addEventListener('mouseup', dragEnd);
                    document.addEventListener('mousemove', dragMove);
                } else {
                    document.addEventListener('touchend', dragEnd);
                    document.addEventListener('touchmove', dragMove, { passive: false });
                }
            }

            function dragMove(e) {
                const clientX = e.type === 'touchmove' ? e.touches[0].clientX : e.clientX;
                const clientY = e.type === 'touchmove' ? e.touches[0].clientY : e.clientY;

                e.preventDefault();
                const dx = clientX - mouseX;
                const dy = clientY - mouseY;
                mouseX = clientX;
                mouseY = clientY;

                curTop += dy;
                curLeft += dx;

                // Clamp to the viewport (not the excel box) so the widget can leave
                // the simulated Excel window but never go fully off-screen.
                const maxTop = window.innerHeight - widget.offsetHeight;
                const maxLeft = window.innerWidth - widget.offsetWidth;

                if (curTop < 0) curTop = 0;
                if (curTop > maxTop) curTop = maxTop;

                if (curLeft < 0) curLeft = 0;
                if (curLeft > maxLeft) curLeft = maxLeft;

                widget.style.top = curTop + "px";
                widget.style.left = curLeft + "px";
                widget.style.right = "auto";
                practiceState.widgetPos = { top: curTop, left: curLeft };
            }
            
            function dragEnd(e) {
                document.removeEventListener('mouseup', dragEnd);
                document.removeEventListener('mousemove', dragMove);
                document.removeEventListener('touchend', dragEnd);
                document.removeEventListener('touchmove', dragMove);
            }
        }

        function toggleWidgetCollapse(e) {
            if (e) {
                e.stopPropagation();
                e.preventDefault();
            }
            const widget = document.getElementById('trial-floating-widget');
            if (widget) {
                const isCollapsed = widget.classList.toggle('collapsed');
                practiceState.widgetCollapsed = isCollapsed;
                const btn = widget.querySelector('.widget-toggle-btn');
                if (btn) {
                    btn.innerText = isCollapsed ? '➕' : '➖';
                }

                if (!isCollapsed && widget.classList.contains('free-floating')) {
                    setTimeout(() => {
                        if (widget) {
                            const rect = widget.getBoundingClientRect();
                            let currentTop = rect.top;
                            let currentLeft = rect.left;

                            const maxTop = window.innerHeight - widget.offsetHeight;
                            const maxLeft = window.innerWidth - widget.offsetWidth;

                            let adjusted = false;
                            if (currentTop > maxTop) {
                                currentTop = Math.max(0, maxTop);
                                adjusted = true;
                            }
                            if (currentLeft > maxLeft) {
                                currentLeft = Math.max(0, maxLeft);
                                adjusted = true;
                            }
                            
                            if (adjusted) {
                                widget.style.top = currentTop + "px";
                                widget.style.left = currentLeft + "px";
                                practiceState.widgetPos = { top: currentTop, left: currentLeft };
                            }
                        }
                    }, 320);
                }
            }
        }

        let autoScrollInterval = null;
        let autoScrollSpeedX = 0;
        let autoScrollSpeedY = 0;

        window.addEventListener('mousemove', (e) => {
            if (!practiceState.isDraggingRange && !practiceState.isDraggingFormulaRange) {
                if (autoScrollInterval) {
                    clearInterval(autoScrollInterval);
                    autoScrollInterval = null;
                }
                return;
            }
            
            const wrapper = document.getElementById('practice-wrapper');
            if (!wrapper) return;
            
            const rect = wrapper.getBoundingClientRect();
            const threshold = 40; 
            const maxSpeed = 20; 
            
            autoScrollSpeedX = 0;
            autoScrollSpeedY = 0;
            
            if (e.clientX > rect.right - threshold) {
                autoScrollSpeedX = Math.min(maxSpeed, ((e.clientX - (rect.right - threshold)) / threshold) * maxSpeed);
            } else if (e.clientX < rect.left + threshold) {
                autoScrollSpeedX = -Math.min(maxSpeed, (((rect.left + threshold) - e.clientX) / threshold) * maxSpeed);
            }
            
            if (e.clientY > rect.bottom - threshold) {
                autoScrollSpeedY = Math.min(maxSpeed, ((e.clientY - (rect.bottom - threshold)) / threshold) * maxSpeed);
            } else if (e.clientY < rect.top + threshold) {
                autoScrollSpeedY = -Math.min(maxSpeed, (((rect.top + threshold) - e.clientY) / threshold) * maxSpeed);
            }
            
            if (autoScrollSpeedX !== 0 || autoScrollSpeedY !== 0) {
                if (!autoScrollInterval) {
                    autoScrollInterval = setInterval(() => {
                        const wrapperEl = document.getElementById('practice-wrapper');
                        if (wrapperEl) {
                            wrapperEl.scrollLeft += autoScrollSpeedX;
                            wrapperEl.scrollTop += autoScrollSpeedY;
                        }
                    }, 30);
                }
            } else {
                if (autoScrollInterval) {
                    clearInterval(autoScrollInterval);
                    autoScrollInterval = null;
                }
            }
        });

        function onWindowMouseUp(e) {
            if (autoScrollInterval) {
                clearInterval(autoScrollInterval);
                autoScrollInterval = null;
            }

            if (practiceState.isDraggingFill) {
                practiceState.isDraggingFill = false;
                const start = practiceState.dragSourceIdx;
                const end = practiceState.dragCurrentRowIdx;
                
                if (start !== undefined && end !== undefined && start !== end) {
                    const min = Math.min(start, end);
                    const max = Math.max(start, end);
                    const sourceVal = (practiceState.inputValues && practiceState.inputValues[start] !== undefined)
                        ? practiceState.inputValues[start]
                        : '';
                        
                    if (sourceVal) {
                        for (let i = min; i <= max; i++) {
                            if (i === start) continue;
                            const adjusted = adjustFormulaForAutofill(sourceVal, start, i);
                            if (!practiceState.inputValues) practiceState.inputValues = {};
                            practiceState.inputValues[i] = adjusted;
                        }
                    }
                }
                
                document.querySelectorAll('.cell.answer-col').forEach(c => {
                    c.classList.remove('fill-drag-target');
                });
                
                renderTask();
            }
            
            if (practiceState.isDraggingRange || practiceState.isDraggingFormulaRange) {
                const start = practiceState.dragStartCell;
                const sel = practiceState.selectedRange;
                if (start && start.r === -1 && sel && sel.minCol === sel.maxCol && sel.minRow === sel.maxRow) {
                    practiceState.selectedCol = start.c;
                    practiceState.selectedCell = null;
                    practiceState.selectedRange = null;
                    renderTask();
                }

                // 格式刷拖曳自動塗刷邏輯
                if (currentTask && currentTask.skillId === 'FORMAT' && practiceState.painterCopied && !practiceState.painterApplied) {
                    if (sel && sel.minRow === 1 && sel.maxRow === practiceState.displayRows.length - 1 && sel.minCol === 0 && sel.maxCol === 7) {
                        practiceState.painterApplied = true;
                        renderTask();
                        showFeedback(true);
                    } else if (sel && (sel.minRow !== sel.maxRow || sel.minCol !== sel.maxCol)) {
                        showFeedbackMessage(false, "❌ 請選取 A3:H" + (practiceState.displayRows.length + 1) + " 範圍以塗刷格式！");
                    }
                }
                
                practiceState.isDraggingRange = false;
                practiceState.isDraggingFormulaRange = false;
            }
        }

        window.addEventListener('mouseup', onWindowMouseUp);

        document.addEventListener('keydown', (e) => {
            if (e.ctrlKey) {
                if (e.key === ';') {
                    e.preventDefault();
                    if (practiceState.activeInput) {
                        const today = new Date();
                        const todayStr = today.getFullYear() + '/' + String(today.getMonth() + 1).padStart(2, '0') + '/' + String(today.getDate()).padStart(2, '0');
                        practiceState.activeInput.value = todayStr;
                        updateActiveInputValue(todayStr);
                    }
                } else if (e.key.toLowerCase() === 'f') {
                    e.preventDefault();
                    openFindReplaceModal('find');
                } else if (e.key.toLowerCase() === 'h') {
                    e.preventDefault();
                    openFindReplaceModal('replace');
                }
            }
        });

        document.addEventListener('DOMContentLoaded', () => {
            renderStoryCards();
        });
    </script>
</body>
</html>
