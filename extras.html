<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>試算表魔法冒險 - 番外篇與小型試煉</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700;900&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            margin: 0; padding: 0;
            background: url('BG/intro/7_bg.png') no-repeat center center fixed !important;
            background-size: cover !important;
            min-height: 100vh;
            height: auto !important;
            overflow-y: auto !important;
            display: block !important;
            font-family: 'Inter', 'Noto Serif TC', serif;
            color: #f5f0eb;
            position: relative;
            zoom: 0.9;
        }
        body::before {
            content: '';
            position: absolute;
            inset: 0;
            z-index: -1;
            pointer-events: none;
        }

        /* 頂部返回主遊戲按鈕 */
        .return-btn {
            position: absolute; top: 24px; right: 28px;
            padding: 8px 24px; 
            background: linear-gradient(135deg, #a61c1c, #6b0c0c);
            color: #ffe6aa; 
            border: 2px solid #dcb265; 
            border-radius: 24px;
            font-weight: 700; cursor: pointer; text-decoration: none;
            display: inline-flex; align-items: center; gap: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5), inset 0 0 8px rgba(220,178,101,0.2);
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1); 
            z-index: 100; font-size: 0.9rem;
            text-shadow: 0 1px 2px rgba(0,0,0,0.5);
            font-family: 'Noto Serif TC', serif;
        }
        .return-btn:hover { 
            background: linear-gradient(135deg, #c02525, #851212); 
            color: #ffffff;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(220, 178, 101, 0.4), inset 0 0 10px rgba(255,255,255,0.2);
        }
        .return-btn:active {
            transform: translateY(0);
        }
        .compass-icon {
            fill: #ffe6aa;
            filter: drop-shadow(0 1px 2px rgba(0,0,0,0.5));
            transition: transform 0.5s ease;
        }
        .return-btn:hover .compass-icon {
            transform: rotate(360deg);
            fill: #ffffff;
        }

        .extras-shell {
            max-width: 1200px; margin: 0 auto; padding: 40px 24px 80px;
            box-sizing: border-box;
            position: relative;
            z-index: 10;
        }

        /* 頂部標題列 */
        .extras-header {
            margin-bottom: 30px;
            text-align: left;
        }
        .extras-title-row {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 8px;
        }
        .header-moon-icon {
            width: 38px;
            height: 38px;
            filter: drop-shadow(0 0 8px rgba(220, 178, 101, 0.6));
        }
        .extras-header h1 {
            font-family: 'Noto Serif TC', serif; 
            color: #ffffff; 
            font-size: 2.1rem;
            font-weight: 900;
            letter-spacing: 2px; 
            margin: 0;
            text-shadow: 0 0 12px rgb(0, 0, 0), 0 2px 4px rgba(0, 0, 0, 0.6);
        }
        .extras-header p {
            color: #dfb56c;
            font-size: 1.05rem;
            margin: 0;
            font-weight: 700;
            letter-spacing: 1px;
            text-shadow: 0 1px 3px rgba(0,0,0,0.5);
            font-family: 'Noto Serif TC', serif;
        }

        /* 標題金色裝飾分割線 */
        .header-divider {
            display: flex;
            align-items: center;
            justify-content: flex-start;
            margin: 14px 0 10px;
            gap: 12px;
            width: 100%;
            max-width: 480px;
        }
        .divider-line {
            height: 1px;
            background: linear-gradient(to right, #dfb56c, transparent);
            flex: 1;
        }
        .header-divider .divider-line:first-child {
            background: linear-gradient(to left, #dfb56c, transparent);
            max-width: 40px;
        }
        .divider-diamond {
            width: 8px;
            height: 8px;
            background: #dfb56c;
            transform: rotate(45deg);
            box-shadow: 0 0 10px #dfb56c;
        }

        /* 左右並排格狀版面 */
        .extras-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 36px;
            margin-top: 20px;
            transition: opacity 0.3s ease;
        }
        @media (max-width: 850px) {
            .extras-grid {
                grid-template-columns: 1fr;
                gap: 40px;
            }
            .return-btn {
                position: static;
                margin-bottom: 20px;
                display: flex;
                width: fit-content;
            }
        }

        .column-panel {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            width: 100%;
        }

        /* 標題徽章 */
        .panel-tag {
            padding: 6px 20px;
            font-family: 'Noto Serif TC', serif;
            font-weight: 700;
            font-size: 0.95rem;
            color: #ffe6aa;
            border-radius: 4px 12px 0 0;
            letter-spacing: 1px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            text-shadow: 0 1px 2px rgba(0,0,0,0.5);
        }
        .story-tag {
            background: linear-gradient(135deg, #a72828, #7a1616);
            border: 1.5px solid #dcb265;
            border-bottom: none;
        }
        .trial-tag {
            background: linear-gradient(135deg, #614630, #3d2a1b);
            border: 1.5px solid #a87e56;
            border-bottom: none;
        }

        /* 故事卡外框線 */
        .story-card-frame {
            width: 100%;
            border: 4px double #cccccc;
            border-radius: 0 16px 16px 16px;
            padding: 5px;
            background: rgba(255,255,255,0.06);
            box-shadow: 0 12px 36px rgba(0,0,0,0.5);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-sizing: border-box;
            cursor: pointer;
        }
        .story-card-frame:hover {
            border-color: #dfb56c;
            transform: translateY(-4px);
            box-shadow: 0 16px 40px rgba(223, 181, 108, 0.25), 0 12px 36px rgba(0,0,0,0.6);
        }
        .story-card-inner {
            width: 100%;
            aspect-ratio: 1.62;
            background-image: url('BG/intro/1_bonus.png');
            background-size: cover;
            background-position: center;
            border-radius: 10px;
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: flex-end;
        }
        .story-card-overlay {
            background: linear-gradient(to top, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0.4) 60%, transparent 100%);
            width: 100%;
            padding: 24px 20px 16px;
            box-sizing: border-box;
        }
        .story-card-title {
            font-family: 'Noto Serif TC', serif;
            font-size: 1.55rem;
            color: #ffffff;
            font-weight: 700;
            margin: 0 0 6px 0;
            text-shadow: 0 2px 4px rgba(0,0,0,0.9);
            letter-spacing: 1px;
        }
        .story-card-subtitle {
            font-family: 'Noto Serif TC', serif;
            font-size: 0.95rem;
            color: #d1c8be;
            margin: 0;
            text-shadow: 0 1px 3px rgba(0,0,0,0.9);
        }

        /* 試煉卡外框線 */
        .trial-card-frame {
            width: 100%;
            border: 4px double #a87e56;
            border-radius: 0 16px 16px 16px;
            padding: 5px;
            background: rgba(255,255,255,0.06);
            box-shadow: 0 12px 36px rgba(0,0,0,0.5);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-sizing: border-box;
            cursor: pointer;
        }
        .trial-card-frame:hover {
            border-color: #dfb56c;
            transform: translateY(-4px);
            box-shadow: 0 16px 40px rgba(223, 181, 108, 0.25), 0 12px 36px rgba(0,0,0,0.6);
        }
        .trial-card-inner {
            width: 100%;
            aspect-ratio: 1.62;
            background: rgba(18, 14, 11, 0.85);
            border-radius: 10px;
            box-sizing: border-box;
            padding: 24px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 16px;
        }
        /* 試煉橫幅按鈕 */
        .trial-banner {
            background: linear-gradient(135deg, #2b3d30, #142718);
            border: 2px solid #a87e56;
            border-radius: 8px;
            padding: 14px 20px;
            display: flex;
            align-items: center;
            gap: 16px;
            box-shadow: 0 6px 15px rgba(0,0,0,0.4), inset 0 0 10px rgba(255,255,255,0.05);
            transition: all 0.25s ease;
        }
        .trial-card-frame:hover .trial-banner {
            border-color: #dfb56c;
            background: linear-gradient(135deg, #38503f, #193320);
            box-shadow: 0 8px 20px rgba(223, 181, 108, 0.2), 0 6px 15px rgba(0,0,0,0.4);
        }
        .trial-icon {
            width: 48px;
            height: 48px;
            object-fit: contain;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5));
            transition: transform 0.3s ease;
        }
        .trial-card-frame:hover .trial-icon {
            transform: scale(1.1);
        }
        .trial-title {
            font-family: 'Noto Serif TC', serif;
            font-size: 1.6rem;
            color: #ffe3a8;
            font-weight: 700;
            letter-spacing: 2px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.6);
        }
        .trial-card-frame:hover .trial-title {
            color: #ffffff;
        }
        /* 試煉說明列表 */
        .trial-details {
            list-style: none;
            padding: 0;
            margin: 0;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .trial-details li {
            font-size: 0.95rem;
            color: #ddd3c5;
            padding-left: 18px;
            position: relative;
            line-height: 1.4;
            font-weight: 600;
            text-shadow: 0 1px 2px rgba(0,0,0,0.5);
        }
        .trial-details li::before {
            content: '◆';
            position: absolute;
            left: 0;
            top: 0;
            color: #a87e56;
            font-size: 0.8rem;
        }
        .trial-card-frame:hover .trial-details li::before {
            color: #dfb56c;
            text-shadow: 0 0 5px #dfb56c;
        }

        /* 底部 Carousel 指示點 */
        .carousel-dots {
            display: flex;
            justify-content: center;
            gap: 12px;
            width: 100%;
            margin-top: 16px;
            padding-left: 0;
            box-sizing: border-box;
        }
        .dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            border: 1.5px solid #a87e56;
            background: transparent;
            cursor: pointer;
            transition: all 0.25s ease;
        }
        .dot:hover {
            border-color: #dfb56c;
            background: rgba(223, 181, 108, 0.2);
            transform: scale(1.2);
        }
        .dot.active {
            background: #dfb56c;
            border-color: #dfb56c;
            box-shadow: 0 0 8px #dfb56c;
            transform: scale(1.2);
        }

        /* ---- Excel 試煉工作區 ---- */
        #trial-workspace {
            width: 100%;
            background: rgba(255,255,255,0.02);
            border: 1px solid rgba(223, 181, 108, 0.25);
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 15px 45px rgba(0,0,0,0.6);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            box-sizing: border-box;
            transition: all 0.3s ease;
        }
        .trial-workspace-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
            border-bottom: 1.5px solid rgba(223, 181, 108, 0.25);
            padding-bottom: 16px;
        }
        .back-to-menu-btn {
            background: transparent;
            border: 1px solid #dfb56c;
            color: #dfb56c;
            padding: 8px 18px;
            font-size: 0.9rem;
            font-weight: 700;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: 'Noto Serif TC', serif;
        }
        .back-to-menu-btn:hover {
            background: rgba(223, 181, 108, 0.1);
            color: #ffffff;
            border-color: #ffffff;
            box-shadow: 0 0 10px rgba(223, 181, 108, 0.3);
        }
        .trial-workspace-title {
            font-family: 'Noto Serif TC', serif;
            font-size: 1.45rem;
            color: #ffe6aa;
            font-weight: 700;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }

        /* 吐司通知提示 */
        .toast-msg {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: rgba(18, 14, 11, 0.95);
            border: 1.5px solid #dfb56c;
            color: #ffe3a8;
            padding: 12px 28px;
            border-radius: 8px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.6);
            z-index: 9999;
            font-weight: 700;
            font-family: 'Noto Serif TC', serif;
            opacity: 0;
            transition: all 0.3s ease;
            pointer-events: none;
        }
        .toast-msg.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        .story-empty { text-align: center; color: #ca750e; padding: 40px; font-size: 0.9rem; }

        #extras-story-overlay {
            display: none; position: fixed; inset: 0; background: rgba(243, 243, 243, 0.062);
            z-index: 2000; flex-direction: column; align-items: center; justify-content: center;
            transition: background 0.3s ease-in-out;
            overflow: hidden;
        }
        #extras-story-overlay.active { display: flex; }
        
        .extras-story-bg-blur {
            position: absolute;
            inset: 0;
            background-size: cover;
            background-position: center;
            filter: blur(1px) brightness(0.65);
            transform: scale(1.08); /* avoid white edges from blur */
            z-index: 0;
            transition: background-image 0.5s ease-in-out;
        }

        .extras-story-back-btn {
            position: fixed; top: 20px; left: 24px; color: rgba(255, 255, 255, 0.85);
            cursor: pointer; font-size: 2.2rem; z-index: 2020; transition: all 0.22s;
            user-select: none; font-family: 'Inter', sans-serif;
            display: flex; align-items: center; justify-content: center;
            width: 44px; height: 44px;
        }
        .extras-story-back-btn:hover { color: #fff; transform: scale(1.15); }

        #extras-story-box {
            width: min(540px, 90vw); 
            height: 720px; 
            max-height: 82vh;
            padding: 50px 45px 35px;
            display: flex; flex-direction: column;
            position: relative;
            background: rgba(255, 255, 255, 0.72);
            border: 1px solid rgba(255, 255, 255, 0.55);
            border-top-right-radius: 90px; 
            border-bottom-left-radius: 24px; 
            border-bottom-right-radius: 24px; 
            border-top-left-radius: 24px;
            box-shadow: 0 20px 50px rgb(0, 0, 0), inset 0 0 0 1px rgba(255,255,255,0.4);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            box-sizing: border-box;
            margin-bottom: 90px;
            z-index: 2;
            overflow: hidden;
            transition: all 0.3s ease;
        }
        #extras-story-box:hover {
            border-color: rgba(255, 255, 255, 0.8);
            box-shadow: 0 24px 60px rgba(0,0,0,0.22), inset 0 0 0 1px rgba(255,255,255,0.5);
        }
        
        .extras-story-top-right-decor {
            position: absolute;
            top: 0; right: 0;
            width: 190px; height: 230px;
            background-size: cover;
            background-position: center;
            z-index: 1;
            pointer-events: none;
            -webkit-mask-image: radial-gradient(circle at top right, rgba(0,0,0,1) 40%, rgba(0,0,0,0) 80%);
            mask-image: radial-gradient(circle at top right, rgba(0,0,0,1) 40%, rgba(0,0,0,0) 80%);
            opacity: 0.92;
            transition: background-image 0.5s ease-in-out;
        }

        .extras-story-header-decor {
            position: absolute;
            top: 28px;
            left: 45px;
            font-size: 4.2rem;
            font-family: 'Georgia', serif;
            font-style: italic;
            font-weight: 300;
            color: rgba(140, 98, 57, 0.05);
            pointer-events: none;
            user-select: none;
            z-index: 1;
        }

        .extras-story-book-header {
            display: flex;
            flex-direction: column;
            border-bottom: 1px solid rgba(140, 98, 57, 0.12);
            padding-bottom: 18px;
            margin-bottom: 22px;
            z-index: 2;
            box-sizing: border-box;
        }
        #extras-story-title-display {
            font-size: 1.55rem;
            font-weight: 700;
            color: #3c3020;
            font-family: 'Noto Serif TC', serif;
            letter-spacing: 1px;
            margin-bottom: 4px;
        }
        .extras-story-book-subtitle {
            font-size: 0.72rem;
            color: #8a7b6a;
            letter-spacing: 3px;
            font-weight: bold;
        }

        #extras-story-speaker-tag {
            display: flex;
            align-items: center;
            margin-bottom: 18px;
            z-index: 2;
            box-sizing: border-box;
        }
        #extras-story-speaker-name {
            font-size: 1.1rem;
            font-weight: 700;
            color: #5c4a3c;
            font-family: 'Noto Serif TC', serif;
            position: relative;
            padding-left: 14px;
        }
        #extras-story-speaker-name::before {
            content: '';
            position: absolute;
            left: 0;
            top: 50%;
            transform: translateY(-50%);
            width: 4px;
            height: 16px;
            background: #8c6239;
            border-radius: 2px;
        }

        #extras-story-text {
            flex: 1;
            font-size: 1.12rem; 
            line-height: 1.85; 
            text-align: justify; 
            color: #2c2520;
            font-family: 'Noto Serif TC', serif; 
            font-weight: 500;
            margin-bottom: 20px;
            overflow-y: auto;
            padding-right: 6px;
            z-index: 2;
            box-sizing: border-box;
        }
        #extras-story-text::-webkit-scrollbar { width: 4px; }
        #extras-story-text::-webkit-scrollbar-thumb { background: rgba(140, 98, 57, 0.2); border-radius: 2px; }

        .story-p {
            text-indent: 2em;
            margin: 0 0 1.2em 0;
            text-align: justify;
        }
        .story-p:last-child {
            margin-bottom: 0;
        }

        .extras-story-nav-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-top: auto;
            border-top: 1px solid rgba(140, 98, 57, 0.12);
            padding-top: 18px;
            z-index: 2;
            box-sizing: border-box;
        }
        .extras-story-nav-btn {
            background: transparent;
            border: none;
            color: #8c3939;
            font-size: 0.95rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
            padding: 6px 14px;
            border-radius: 20px;
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }
        .extras-story-nav-btn:hover:not(:disabled) {
            background: rgba(140, 98, 57, 0.08);
            color: #5c4a3c;
        }
        .extras-story-nav-btn:disabled {
            color: rgba(140, 98, 57, 0.28);
            cursor: not-allowed;
        }
        .extras-story-page-num {
            font-size: 0.95rem;
            color: #6e5e49;
            font-weight: bold;
            font-family: 'Inter', sans-serif;
            letter-spacing: 1px;
        }

        .extras-story-page-timeline {
            position: absolute;
            bottom: 22px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 16px;
            align-items: flex-end;
            z-index: 2010;
            max-width: 95vw;
            padding: 10px 20px 22px;
            box-sizing: border-box;
            overflow-x: visible;
        }
        .extras-story-page-timeline::before {
            content: '';
            position: absolute;
            bottom: 12px;
            left: 0; right: 0;
            height: 1px;
            background: linear-gradient(to right, transparent, rgba(255, 255, 255, 0.28) 15%, rgba(255, 255, 255, 0.28) 85%, transparent);
            z-index: 0;
        }
        
        .extras-story-page-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            cursor: pointer;
            z-index: 1;
            transition: transform 0.25s ease;
            user-select: none;
        }
        .extras-story-page-card-inner {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 36px;
            height: 46px;
            background: rgba(255, 255, 255, 0.12);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 4px;
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.95rem;
            font-weight: bold;
            box-shadow: 0 4px 10px rgba(0,0,0,0.25);
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            font-family: 'Inter', sans-serif;
        }
        .extras-story-page-card:hover .extras-story-page-card-inner {
            background: rgba(255, 255, 255, 0.22);
            border-color: rgba(255, 255, 255, 0.5);
            color: #fff;
            transform: translateY(-5px);
        }
        .extras-story-page-card.active .extras-story-page-card-inner {
            background: rgba(255, 255, 255, 0.35);
            border-color: #ffd700;
            color: #ffd700;
            transform: translateY(-8px);
            box-shadow: 0 0 15px rgba(255, 215, 0, 0.4), 0 4px 10px rgba(0,0,0,0.3);
        }
        .extras-story-page-dot {
            width: 5px;
            height: 5px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.4);
            margin-top: 10px;
            transition: all 0.25s ease;
            z-index: 2;
            box-shadow: 0 0 4px rgba(0,0,0,0.5);
        }
        .extras-story-page-card:hover .extras-story-page-dot {
            background: rgba(255, 255, 255, 0.85);
            transform: scale(1.2);
        }
        .extras-story-page-card.active .extras-story-page-dot {
            background: #ffd700;
            transform: scale(1.6);

        /* Cell selections and range highlights */
        .cell.selected-cell {

            background-color: rgba(33, 115, 70, 0.08) !important;

        .fill-handle {
            position: absolute;

            height: 8px;
            background-color: #217346;
            border: 1px solid #fff;
            right: -4px;
            bottom: -4px;
            z-index: 10;

        }
        .fill-handle::after {
            content: '';
            position: absolute;
            top: -6px;
            left: -6px;
            right: -6px;
            bottom: -6px;
            background: transparent;

        /* 魔法羊皮紙懸浮視窗 (Option 3) */

        .floating-widget {

            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        .floating-widget.free-floating {

        .practice-btn.mini.secondary {

        /* Excel Modals & Dialogs */

                    { n: "葛蕾", t: "金穗鎮的午夜，蠟燭燃燒殆盡，剩下殘餘的蠟油順著燭台滴落，發出細微的凝固聲。我的手指因為長時間握筆而僵硬得幾乎無法伸直，指腹上那層薄薄的繭在燈影下顯得有些發亮。帳簿上的字跡很亂，那是剛從泥濘的貨運碼頭送進來的清單，紙張邊緣還沾著沒乾透的泥水。我用力揉了揉酸澀的雙眼，視線重新聚焦在那些跳動的數字上。", a: "glea", bg: "intro/3_bonus.png" },
                    { n: "葛蕾", t: "「葛蕾，妳還在算？」\n前輩的聲音是一陣風，溫和地吹散了這屋子裡的沈悶。他站在門口，手裡提著那盞防風燈，金屬外殼被擦得錚亮。他是我入職後最敬重的人，總是在我手忙腳亂時遞來一杯溫熱的清茶，用那種沉穩的語氣告訴我：數據錯了可以改，但人累壞了，這鎮子就失去支持了。", a: "glea", bg: "intro/3_bonus.png" },
                    { n: "葛蕾", t: "我放下筆，挺直了痠痛的背脊，輕輕吁了一口氣。窗外是大雨敲擊木板的聲音，節奏亂得讓人心慌。\n「還有這幾頁，核對完我就走。」\n「妳太過賣力了。」前輩笑了笑。", a: "glea", bg: "intro/3_bonus.png" },
                    { n: "葛蕾", t: "笑容在搖曳的燭火中顯得異常慈祥，帶著一種令我無法抗拒的寬容。\n「看看妳，眼睛都紅了。這份清單，我早看過一遍了，沒問題的。妳現在就回去睡吧，剩下的我來結尾就好。」", a: "glea", bg: "intro/3_bonus.png" },
                    { n: "葛蕾", t: "他走過來，動作自然地將我手裡的帳簿抽走。那雙手溫暖而乾燥，帶著一種讓人無條件信賴的力度。我本能地想拒絕，但心臟深處那股隱隱作祟的緊繃感，在他的安撫下徹底瓦解。\n「妳相信我嗎？」\n我點了點頭。在這亂世裡，他是唯一一個讓我相信秩序真的存在的人。", a: "glea", bg: "intro/3_bonus.png" },
                    { n: "葛蕾", t: "那一晚，我睡得很沈。沒有成堆的貨運單，只有碼頭上吹來的鹹腥冷風。直到清晨，急促的拍門聲將我從夢境撕碎。\n「葛蕾！出事了！庫房……庫房空了！」", a: "glea", bg: "intro/3_bonus.png" },
                    { n: "葛蕾", t: "當我跌跌撞撞趕到辦公帳篷時，鎮長那張漲成豬肝色的臉成了我記憶裡最恐怖的底色。桌上的櫃子大開著，原本存放糧食配額與藥材存單的鐵盒，只剩下一道空洞的縫隙。我不相信。發瘋似地翻開備份清單，指尖顫抖著劃過每一行。原本應該在那裡的蓋章，全都消失了。連同那些重要的原件、鎮上的印章，以及那位一直以來帶領著我的前輩的名字。", a: "glea", bg: "intro/3_bonus.png" },
                    { n: "葛蕾", t: "我耳邊「嗡」的一聲。三天前。他跟我說他要休息，而他早就準備好要離開。我的雙手僵在半空中，指尖還沾著昨天深夜為了核對帳目而染上的墨跡。那個瞬間，整個帳篷裡的空氣彷彿瞬間被抽乾，寒意從腳底板直竄天靈蓋。我不斷在心裡尖叫著：如果那天晚上我沒有聽他的話離開，如果我堅持把帳算完……沒有如果。因為那一刻的懈怠，金穗鎮最重要的物資底牌被人連根拔起。", a: "glea", bg: "intro/3_bonus.png" },
                    { n: "葛蕾", t: "「葛蕾，這到底是怎麼回事！」鎮長的咆哮聲在帳篷裡炸開，但我什麼都聽不見了。\n我只看到紙面上那一行行空白的表格。它們像是一張張張開的嘴，嘲弄著我的無知與輕信。原本牢牢抓在手心裡的沙子，因為我的一時放鬆，被風吹得一乾二淨。", a: "glea", bg: "intro/3_bonus.png" },
                    { n: "葛蕾", t: "自那之後。我只要閒下來，大腦就會自動重播那一晚，他抽走帳簿的手，搖晃的燈光，以及我自己那句「謝謝」。每一分、每一秒的停頓，都化作了蝕骨的愧疚。所以我只能不停地做，不停地算。我將每一個細節精確到連小數點後三位都不放過。有時候，鎮民看著我那副不知疲倦的樣子，會小心翼翼地問我是不是太累了，但我總會搖搖頭，然後更用力地將筆尖戳進紙張。", a: "glea", bg: "intro/3_bonus.png" },
                    { n: "葛蕾", t: "我知道，只要我不停下來，那些令我恐懼的空白就不會追上我。只要我不做錯任何事，那個夢魘般的早晨就不會再次降臨。\n我是這鎮子裡的後勤官。我不需要名聲，也不需要金錢，我只需要這一份帳目在我的指尖下，永遠保持著完美的、令人心安的秩序。", a: "glea", bg: "intro/3_bonus.png" },
                    { n: "葛蕾", t: "那是我的救贖，也是我唯一的生存方式。只要我還在做，只要我還沒停下，我就依然是那個有用的、不會再犯錯的葛蕾。", a: "glea", bg: "intro/3_bonus.png" }
                ]
            }
        };

        window.STORY_CARDS = [
            { id: 'demo_001', title: '碎鏡葬舊生', subtitle: '夏特初入學院', cover: 'BG/intro/1_bonus.png' },
            { id: 'demo_002', title: '破土築鐵魂', subtitle: '米羅的抗爭', cover: 'BG/intro/2_bonus.png' },
            { id: 'demo_003', title: '止步悔恨時', subtitle: '葛蕾的愧疚', cover: 'BG/intro/3_bonus.png' }
        ];
        let _activeStoryCardIndex = 0;

        function renderActiveStoryCard() {
            const card = window.STORY_CARDS[_activeStoryCardIndex];
            if (!card) return;
            const innerEl = document.getElementById('story-card-frame-inner');
            const titleEl = document.getElementById('story-card-frame-title');
            const subtitleEl = document.getElementById('story-card-frame-subtitle');
            if (innerEl) innerEl.style.backgroundImage = `url('${card.cover}')`;
            if (titleEl) titleEl.innerText = card.title;
            if (subtitleEl) subtitleEl.innerText = card.subtitle;
            document.querySelectorAll('.carousel-dots .dot').forEach((d, i) => {
                d.classList.toggle('active', i === _activeStoryCardIndex);
            });
        }

        function selectStoryCard(idx) {
            if (idx < 0 || idx >= window.STORY_CARDS.length) {
                showDotToast(idx);
                return;
            }
            _activeStoryCardIndex = idx;
            renderActiveStoryCard();
        }

        function openActiveStory() {
            const card = window.STORY_CARDS[_activeStoryCardIndex];
            if (card) openStory(card.id);
        }

        let _storyState = null;
        let _extrasBgm = null;
        let _currentBgmFile = null;

        function getPlayerGender() {
            let gender = 'girl';
            try {
                const raw = localStorage.getItem('magic_excel_v2_save');
                if (raw) {
                    const data = JSON.parse(raw);
                    if (data.playerConfig && data.playerConfig.gender) {
                        gender = data.playerConfig.gender;
                    }
                }
            } catch(e) {}
            return gender;
        }

        function playExtrasBGM(file) {
            if (_currentBgmFile === file) return;
            if (_extrasBgm) {
                _extrasBgm.pause();
                _extrasBgm = null;
            }
            if (!file) {
                _currentBgmFile = null;
                return;
            }
            _currentBgmFile = file;
            _extrasBgm = new Audio(`BGM/${file}`);
            _extrasBgm.loop = true;
            _extrasBgm.volume = 0.25;
            _extrasBgm.play().catch(e => console.warn("BGM autoplay blocked:", e));
        }

        function playExtrasSE(file) {
            if (!file) return;
            let sfxFile = file;
            const gender = getPlayerGender();
            if (sfxFile.startsWith('me_')) {
                sfxFile = sfxFile.replace('me_', `${gender}_`);
            }
            const audio = new Audio(`sound_effect/${sfxFile}`);
            audio.volume = 0.5;
            audio.play().catch(e => console.warn("SE play blocked:", e));
        }

        function renderStoryCards() {
            const grid = document.getElementById('story-card-grid');
            if (!grid) return;
            const ids = Object.keys(window.SIDE_STORIES || {});
            if (ids.length === 0) {
                grid.innerHTML = '<div class="story-empty">尚無番外篇內容。</div>';
                return;
            }
            grid.innerHTML = ids.map(id => {
                const s = window.SIDE_STORIES[id];
                return `<div class="story-card" onclick="openStory('${id}')">
                    <h3>${s.title}</h3>
                    <p>${s.summary || ''}</p>
                </div>`;
            }).join('');
        }

        function openStory(id) {
            const story = window.SIDE_STORIES[id];
            if (!story) return;
            _storyState = { lines: story.lines, index: 0, title: story.title };
            document.getElementById('extras-story-overlay').classList.add('active');
            
            // Build bottom page timeline cards
            const timeline = document.getElementById('extras-story-timeline');
            if (timeline) {
                timeline.innerHTML = story.lines.map((line, idx) => {
                    return `
                    <div class="extras-story-page-card" id="page-card-${idx}" onclick="jumpToStoryPage(${idx})">
                        <div class="extras-story-page-card-inner">${idx + 1}</div>
                        <div class="extras-story-page-dot"></div>
                    </div>`;
                }).join('');
            }
            
            renderStoryLine();
        }

        function renderStoryLine() {
            if (!_storyState) return;
            const line = _storyState.lines[_storyState.index];
            const overlay = document.getElementById('extras-story-overlay');
            const bgBlurEl = document.getElementById('extras-story-bg-blur');
            const box = document.getElementById('extras-story-box');
            const decorPanel = document.getElementById('extras-story-top-right-decor');
            
            // 1. 文字與標題
            const textEl = document.getElementById('extras-story-text');
            if (textEl) {
                const paragraphs = (line.t || '').split('\n').filter(p => p.trim() !== '');
                textEl.innerHTML = paragraphs.map(p => `<p class="story-p">${p}</p>`).join('');
            }
            
            const nameEl = document.getElementById('extras-story-speaker-name');
            const charInfoEl = document.getElementById('extras-story-speaker-tag');
            
            if (line.n) {
                nameEl.innerText = line.n;
                charInfoEl.style.display = 'flex';
            } else {
                nameEl.innerText = '';
                charInfoEl.style.display = 'none';
            }
            
            // 右上角立繪/風景切換
            if (decorPanel) {
                let illustrationSrc = 'BG/bg7 garden.png'; // 預設風景
                if (line.a) {
                    const charAssets = {
                        'me': getPlayerGender() === 'girl' ? 'Charater/main girl.png' : 'Charater/main boy.png',
                        'fairy': 'Charater/fairy.png',
                        'head': 'Charater/head.png',
                        'system': 'Charater/魔導書.png',
                        'glea': 'Charater/glea.png',
                        'miro': 'Charater/Miro.png',
                        'chate': 'Charater/chate.png',
                        'royi': 'Charater/Royi.png',
                        'prince': 'Charater/prince boy.png',
                        'king': 'Charater/king.png'
                    };
                    illustrationSrc = charAssets[line.a] || `Charater/${line.a}.png`;
                }
                decorPanel.style.backgroundImage = `url('${illustrationSrc}')`;
            }
            
            // 2. 全螢幕背景 / CG 顯示 (修復 intro/1_bonus.png 無法顯示問題)
            if (line.bg) {
                let fullPath = line.bg;
                if (!fullPath.startsWith('BG/') && !fullPath.startsWith('cg/') && !fullPath.startsWith('http')) {
                    fullPath = 'BG/' + fullPath;
                }
                if (bgBlurEl) {
                    bgBlurEl.style.backgroundImage = `url('${fullPath}')`;
                } else {
                    overlay.style.backgroundImage = `url('${fullPath}')`;
                    overlay.style.backgroundSize = 'cover';
                    overlay.style.backgroundPosition = 'center';
                }
            } else {
                if (bgBlurEl) bgBlurEl.style.backgroundImage = 'none';
                overlay.style.backgroundImage = 'none';
            }
            
            // 3. 處理背景音樂 (BGM)
            if (line.bgm === null) {
                playExtrasBGM(null);
            } else if (line.bgm) {
                playExtrasBGM(line.bgm);
            }
            
            // 4. 處理音效 (SE)
            if (line.se) {
                playExtrasSE(line.se);
            }
            
            // 5. 處理電影感畫面特效
            // 震動
            if (line.shake) {
                box.classList.remove('shake-active');
                requestAnimationFrame(() => requestAnimationFrame(() => box.classList.add('shake-active')));
            } else {
                box.classList.remove('shake-active');
            }
            
            // 閃光
            if (line.flash) {
                let flashEl = document.getElementById('extras-flash-overlay');
                if (!flashEl) {
                    flashEl = document.createElement('div');
                    flashEl.id = 'extras-flash-overlay';
                    flashEl.className = 'flash-overlay';
                    document.body.appendChild(flashEl);
                }
                flashEl.classList.remove('flash-active');
                requestAnimationFrame(() => requestAnimationFrame(() => flashEl.classList.add('flash-active')));
            }
            
            // 獨立畫面特效
            if (line.screenEffect) {
                overlay.classList.remove('screen-glitch', 'screen-heartbeat', 'screen-dissolve', 'screen-glow', 'screen-reality-tear', 'screen-reality-tear-slow', 'screen-eye-open', 'screen-dissolve-to-light');
                requestAnimationFrame(() => requestAnimationFrame(() => overlay.classList.add(`screen-${line.screenEffect}`)));
            } else {
                overlay.classList.remove('screen-glitch', 'screen-heartbeat', 'screen-dissolve', 'screen-glow', 'screen-reality-tear', 'screen-reality-tear-slow', 'screen-eye-open', 'screen-dissolve-to-light');
            }

            // 6. 更新導覽按鈕與進度文字
            const prevBtn = document.getElementById('extras-story-prev-btn');
            const nextBtn = document.getElementById('extras-story-next-btn');
            if (prevBtn) prevBtn.disabled = (_storyState.index === 0);
            if (nextBtn) {
                if (_storyState.index === _storyState.lines.length - 1) {
                    nextBtn.innerText = '結束故事 ✕';
                } else {
                    nextBtn.innerText = '下一頁 〉';
                }
            }

            const pageDisp = document.getElementById('extras-story-page-display');
            if (pageDisp) {
                const currentPage = (_storyState.index + 1).toString().padStart(2, '0');
                const totalPages = _storyState.lines.length.toString().padStart(2, '0');
                pageDisp.innerText = `${currentPage} / ${totalPages}`;
            }

            const titleDisp = document.getElementById('extras-story-title-display');
            if (titleDisp) {
                const currentPage = (_storyState.index + 1).toString().padStart(2, '0');
                titleDisp.innerText = `${currentPage} | ${_storyState.title}`;
            }

            // 更新底部 timeline 卡片高亮與位置
            document.querySelectorAll('.extras-story-page-card').forEach(card => {
                card.classList.remove('active');
            });
            const activeCard = document.getElementById(`page-card-${_storyState.index}`);
            if (activeCard) {
                activeCard.classList.add('active');
                const timeline = document.getElementById('extras-story-timeline');
                if (timeline) {
                    const scrollTarget = activeCard.offsetLeft - timeline.clientWidth / 2 + activeCard.clientWidth / 2;
                    timeline.scrollTo({ left: scrollTarget, behavior: 'smooth' });
                }
            }
        }

        function prevStoryPage(e) {
            if (e) e.stopPropagation();
            if (!_storyState || _storyState.index <= 0) return;
            _storyState.index--;
            renderStoryLine();
        }

        function nextStoryPage(e) {
            if (e) e.stopPropagation();
            if (!_storyState) return;
            if (_storyState.index >= _storyState.lines.length - 1) {
                closeStory();
                return;
            }
            _storyState.index++;
            renderStoryLine();
        }

        function jumpToStoryPage(idx) {
            if (!_storyState || idx < 0 || idx >= _storyState.lines.length) return;
            _storyState.index = idx;
            renderStoryLine();
        }

        function closeStory(e) {
            if (e) e.stopPropagation();
            document.getElementById('extras-story-overlay').classList.remove('active');
            
            const overlay = document.getElementById('extras-story-overlay');
            overlay.classList.remove('screen-glitch', 'screen-heartbeat', 'screen-dissolve', 'screen-glow', 'screen-reality-tear', 'screen-reality-tear-slow', 'screen-eye-open', 'screen-dissolve-to-light');
            
            const box = document.getElementById('extras-story-box');
            box.classList.remove('shake-active');
            
            _storyState = null;
            playExtrasBGM(null);
        }

        // ========================================================
        // 系統二：小型試煉 (Excel Small Drills)
        // ========================================================
        let allSkillDefs = {};
        if (window.V2_CHAPTERS) {
            Object.keys(window.V2_CHAPTERS).sort((a, b) => parseFloat(a) - parseFloat(b)).forEach(chId => {
                const ch = window.V2_CHAPTERS[chId];
                if (ch && ch.skillDefs) Object.assign(allSkillDefs, ch.skillDefs);
            });
        }
        if (!allSkillDefs['COUNTIF']) {
            allSkillDefs['COUNTIF'] = { n: 'COUNTIF 條件統計', s: '請在答案格中輸入統計公式。例如：=COUNTIF(C2:C9,"地區")。' };
        }

        let currentTask = null;
        let practiceState = {
            displayRows: [],
            frozen: false,
            selectedCol: -1,
            selectedCell: null,
            activeRibbonTab: 'start',
            inputValues: {},
            singleInputValue: '',
            selectedRange: null,
            taskCollapsed: false,
            feedback: { ok: null, msg: '' },
            widgetPos: null,
            widgetCollapsed: false
        };

        function drawNewTask(skillId) {
            const prevPos = practiceState.widgetPos;
            const prevCollapsed = practiceState.widgetCollapsed;
            currentTask = window.PracticeEngine.drawTask(allSkillDefs, skillId);
            practiceState = {
                displayRows: currentTask.table.rows.map(r => r.slice()),
                frozen: false,
                selectedCol: currentTask.skillId === 'SORT_SIMPLE' ? currentTask.sortCol : -1,
                selectedCell: null,
                activeRibbonTab: currentTask.skillId === 'SORT_SIMPLE' ? 'data' : (currentTask.skillId === 'F' ? 'view' : 'start'),
                inputValues: {},
                singleInputValue: '',
                selectedRange: null,
                taskCollapsed: false,
                feedback: { ok: null, msg: '' },
                widgetPos: prevPos,
                widgetCollapsed: prevCollapsed,
                
                // New states
                outlineVisible: false,
                outlineEnabled: false,
                filterEnabled: false,
                filteredOutVals: null,
                cellHighlights: {},
                searchFound: false,
                painterCopied: false,
                painterApplied: false,
                validationApplied: false,
                hasBorders: false,
                hasHeaderFill: false,
                mergedRange: null
            };
            
            if (currentTask.skillId === 'AUTOFILL') {
                practiceState.inputValues[0] = currentTask.initialFormula;
            }
            
            renderTask();
        }

        function togglePracticeDrawer() {
            const drawer = document.getElementById('practice-drawer');
            const toggleBtn = document.getElementById('practice-drawer-toggle');
            if (!drawer || !toggleBtn) return;
            
            const isOpen = drawer.style.right === '0px';
            if (isOpen) {
                drawer.style.right = '-320px';
                toggleBtn.style.right = '0';
            } else {
                renderPracticeDrawerList();
                drawer.style.right = '0px';
                toggleBtn.style.right = '320px';
            }
        }

        function renderPracticeDrawerList() {
            const listContainer = document.getElementById('practice-drawer-list');
            if (!listContainer) return;
            listContainer.innerHTML = '';
            
            const templates = window.PracticeEngine.TEMPLATES;
            
            // Update title count dynamically
            const titleEl = document.getElementById('practice-drawer-title');
            if (titleEl) {
                titleEl.innerText = `試煉練習清單 (${templates.length})`;
            }

            templates.forEach((tpl, idx) => {
                const skillId = tpl.skillId;
                const def = allSkillDefs[skillId] || {};
                const skillName = def.n || skillId;
                
                const btn = document.createElement('div');
                btn.style.cssText = `padding: 10px 12px; margin-bottom: 8px; background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(223, 181, 108, 0.15); border-radius: 6px; cursor: pointer; transition: all 0.2s ease; display: flex; align-items: center; justify-content: space-between; font-family: sans-serif;`;
                
                btn.onmouseover = () => {
                    btn.style.background = 'rgba(33, 115, 70, 0.15)';
                    btn.style.borderColor = '#dfb56c';
                };
                btn.onmouseout = () => {
                    btn.style.background = 'rgba(255, 255, 255, 0.05)';
                    btn.style.borderColor = 'rgba(223, 181, 108, 0.15)';
                };
                
                btn.onclick = () => {
                    drawNewTask(skillId);
                    togglePracticeDrawer();
                };
                
                let typeLabel = "公式";
                if (tpl.uiType === 'merge' || tpl.uiType === 'border' || tpl.uiType === 'fill' || tpl.uiType === 'format') {
                    typeLabel = "格式";
                } else if (tpl.uiType === 'search' || tpl.uiType === 'replace' || tpl.uiType === 'fuzzy' || tpl.uiType === 'date') {
                    typeLabel = "編輯";
                } else if (tpl.uiType === 'filter_ui' || tpl.uiType === 'sort' || tpl.uiType === 'sort_dialog' || tpl.uiType === 'filter_adv' || tpl.uiType === 'outline_toggle') {
                    typeLabel = "排序篩選";
                } else if (tpl.uiType === 'validation_ui' || tpl.uiType === 'pivot_ui' || tpl.uiType === 'pivot_group_ui' || tpl.uiType === 'subtotal_ui') {
                    typeLabel = "分析驗證";
                }
                
                btn.innerHTML = `
                    <div style="display:flex; flex-direction:column; gap:2px; flex: 1;">
                        <span style="font-size: 0.85rem; font-weight: bold; color: #fff; text-align: left;">${idx + 1}. ${skillName}</span>
                        <span style="font-size: 0.72rem; color: #a8a29e; text-align: left;">代號: ${skillId}</span>
                    </div>
                    <span style="font-size: 0.68rem; padding: 2px 6px; background: rgba(223, 181, 108, 0.15); color: #ffe6aa; border-radius: 4px; border: 1px solid rgba(223, 181, 108, 0.3); font-weight: bold; margin-left: 8px; white-space: nowrap;">${typeLabel}</span>
                `;
                
                listContainer.appendChild(btn);
            });
        }

        function colLetter(i) { 
            return window.PracticeEngine.indexToColLetter ? window.PracticeEngine.indexToColLetter(i) : String.fromCharCode(65 + i); 
        }

        function switchPracticeTab(tab) {
            practiceState.activeRibbonTab = tab;
            document.querySelectorAll('#ribbon .tab').forEach(t => {
                t.classList.toggle('active', t.id === `p-tab-${tab}`);
            });
            renderPracticeRibbon();
        }

        function renderPracticeRibbon() {
            const container = document.getElementById('practice-ribbon-btns');
            if (!container) return;
            container.innerHTML = '';

            const t = currentTask;
            const tab = practiceState.activeRibbonTab;

            if (tab === 'start') {
                createRibbonBtn("practice-autosum", "自動加總", "icon/auto sum.png", handleRibbonAutoSum, true);
                createRibbonBtn("practice-merge", "跨欄置中", "icon/跨欄置中.png", handleRibbonMerge, true);
                createRibbonBtn("practice-border", "所有框線", "icon/所有框線.png", handleRibbonBorder, true);
                createRibbonBtn("practice-fill", "填滿色彩", "icon/fill colour.png", handleRibbonFill, true);
                createRibbonBtn("practice-painter", "格式刷", "icon/format brush.png", handleRibbonPainter, true);
            } else if (tab === 'insert') {
                createRibbonBtn("practice-pivot", "樞紐分析表", "icon/樞紐分析表.png", handleRibbonPivot, true);
            } else if (tab === 'data') {
                createRibbonBtn("practice-sort-filter", "排序與篩選", "icon/sort&filter.png", openSortFilterDropdown, true);
                createRibbonBtn("practice-validation", "資料驗證", "icon/資料check.png", openValidationDialog, true);
                createRibbonBtn("practice-outline-dropdown", "大綱", "icon/大綱.png", openOutlineDropdown, true);
            } else if (tab === 'view') {
                const isFreezeActive = practiceState.frozen;
                const btn = createRibbonBtn("practice-freeze", "凍結頂端列", "icon/凍結窗格.png", toggleFreezePractice, true);
                if (isFreezeActive && btn) {
                    btn.classList.add('active-toggle');
                    btn.style.background = 'var(--active-blue)';
                    btn.style.borderColor = '#99bce8';
                }
            }
        }

        function openSortFilterDropdown(e) {
            e.stopPropagation();
            e.preventDefault();
            closeAllRibbonDropdowns();
            
            const rect = e.currentTarget.getBoundingClientRect();
            const dropdown = document.createElement('div');
            dropdown.className = 'excel-ribbon-dropdown';
            dropdown.id = 'practice-sort-filter-dropdown';
            dropdown.style.cssText = `position: fixed; top: ${rect.bottom + window.scrollY}px; left: ${rect.left + window.scrollX}px; background: #fff; border: 1px solid #ccc; box-shadow: 0 4px 10px rgba(0,0,0,0.15); z-index: 10500; font-family: sans-serif; font-size: 12px; color: #333; display: flex; flex-direction: column; min-width: 120px;`;
            
            dropdown.innerHTML = `
                <div class="dropdown-item" onclick="applySortPractice('asc'); closeAllRibbonDropdowns();">升序排序</div>
                <div class="dropdown-item" onclick="applySortPractice('desc'); closeAllRibbonDropdowns();">降序排序</div>
                <div class="dropdown-item" onclick="openSortDialog(); closeAllRibbonDropdowns();">自訂排序</div>
                <div class="dropdown-item" onclick="toggleFilterPractice(); closeAllRibbonDropdowns();" style="border-top: 1px solid #eee;">篩選</div>
            `;
            document.body.appendChild(dropdown);
        }
        
        function openOutlineDropdown(e) {
            e.stopPropagation();
            e.preventDefault();
            closeAllRibbonDropdowns();
            
            const rect = e.currentTarget.getBoundingClientRect();
            const dropdown = document.createElement('div');
            dropdown.className = 'excel-ribbon-dropdown';
            dropdown.id = 'practice-outline-dropdown-menu';
            dropdown.style.cssText = `position: fixed; top: ${rect.bottom + window.scrollY}px; left: ${rect.left + window.scrollX}px; background: #fff; border: 1px solid #ccc; box-shadow: 0 4px 10px rgba(0,0,0,0.15); z-index: 10500; font-family: sans-serif; font-size: 12px; color: #333; display: flex; flex-direction: column; min-width: 120px;`;
            
            dropdown.innerHTML = `
                <div class="dropdown-item" onclick="toggleOutlinePractice(); closeAllRibbonDropdowns();">顯示/隱藏大綱</div>
                <div class="dropdown-item" onclick="openSubtotalDialog(); closeAllRibbonDropdowns();">小計</div>
            `;
            document.body.appendChild(dropdown);
        }
        
        function closeAllRibbonDropdowns() {
            const d1 = document.getElementById('practice-sort-filter-dropdown');
            if (d1) d1.remove();
            const d2 = document.getElementById('practice-outline-dropdown-menu');
            if (d2) d2.remove();
        }
        
        document.addEventListener('click', function(e) {
            const isClickInside = e.target.closest('.excel-ribbon-dropdown') || e.target.closest('.ribbon-btn');
            if (!isClickInside) {
                closeAllRibbonDropdowns();
            }
        });

        function createRibbonBtn(id, label, iconPath, clickFn, enabled) {
            const btn = document.createElement('button');
            btn.id = id;
            btn.className = 'ribbon-btn big';
            if (!enabled) {
                btn.style.opacity = '0.4';
                btn.style.cursor = 'not-allowed';
            } else {
                btn.onclick = clickFn;
            }

            const img = document.createElement('img');
            img.src = iconPath;
            img.alt = label;

            const span = document.createElement('span');
            span.innerText = label;

            btn.appendChild(img);
            btn.appendChild(span);

            const container = document.getElementById('practice-ribbon-btns');
            if (container) container.appendChild(btn);
            return btn;
        }

        function handleRibbonAutoSum() {
            const singleInput = document.getElementById('single-answer');
            if (singleInput) {
                singleInput.value = `=SUM(E2:E${practiceState.displayRows.length + 1})`;
                singleInput.focus();
                practiceState.singleInputValue = singleInput.value;
                return;
            }
            const activeInput = document.activeElement;
            if (activeInput && activeInput.classList.contains('grid-cell-input')) {
                activeInput.value = `=SUM(E2:E${practiceState.displayRows.length + 1})`;
                activeInput.focus();
                const idx = parseInt(activeInput.id.replace('ans-', ''), 10);
                if (!isNaN(idx)) {
                    if (!practiceState.inputValues) practiceState.inputValues = {};
                    practiceState.inputValues[idx] = activeInput.value;
                }
            }
        }

        function applySortPractice(dir) {
            const col = practiceState.selectedCol;
            if (col < 0) {
                alert("請先點擊試算表上方的 A~K 欄位標頭來選取要排序的欄位！");
                return;
            }
            practiceState.displayRows.sort((a, b) => {
                let valA = a[col];
                let valB = b[col];

                if (typeof valA === 'string' && valA.endsWith('分')) {
                    valA = parseInt(valA, 10);
                }
                if (typeof valB === 'string' && valB.endsWith('分')) {
                    valB = parseInt(valB, 10);
                }

                if (typeof valA === 'number' && typeof valB === 'number') {
                    return dir === 'desc' ? valB - valA : valA - valB;
                }

                valA = String(valA);
                valB = String(valB);
                return dir === 'desc' ? valB.localeCompare(valA) : valA.localeCompare(valB);
            });
            renderTask();
        }

        function toggleFreezePractice() {
            practiceState.frozen = !practiceState.frozen;
            renderTask();
        }

        function selectCol(colIdx) {
            practiceState.selectedCol = colIdx;
            practiceState.selectedCell = null;
            renderTask();
        }

        function selectCell(rIdx, cIdx) {
            practiceState.selectedCell = { r: rIdx, c: cIdx };
            practiceState.selectedCol = -1;
            practiceState.selectedRange = null;
            renderTask();
        }

        function toggleTip() {
            const tipBox = document.getElementById('task-tip-box');
            if (tipBox) {
                tipBox.classList.toggle('show');
            }
        }

        function toggleTaskRequirement() {
            practiceState.taskCollapsed = !practiceState.taskCollapsed;
            renderTask();
        }

        function renderTask() {
            const area = document.getElementById('practice-area');
            const t = currentTask;
            const header = t.table.header;

            // 1. Calculate Grid Column Widths
            const colWidths = [];
            if (practiceState.outlineVisible) colWidths.push('40px');
            colWidths.push('50px');
            for (let i = 0; i < header.length; i++) colWidths.push('120px');
            if (t.uiType === 'column') colWidths.push('150px');

            // 2. Render Headers (Row Letters & Excel Row 1)
            const colHeaders = [];
            
            // --- CSS Grid Row 1: Column Letters (A, B, C...) ---
            if (practiceState.outlineVisible) {
                colHeaders.push(`<div class="l-head" style="grid-row: 1; grid-column: 1; position: sticky; top: 0; left: 0; z-index: 1003; font-weight: bold; font-size: 10px; display:flex; justify-content:center; align-items:center; border-right:1px solid #e1e1e1; border-bottom:1px solid #e1e1e1; background:#f5f5f5; color:#333;">1 2</div>`);
            }
            // Corner for column letters
            const cornerColIdx = practiceState.outlineVisible ? 2 : 1;
            colHeaders.push(`<div class="l-head" style="grid-row: 1; grid-column: ${cornerColIdx}; position: sticky; top: 0; left: ${practiceState.outlineVisible ? '40px' : '0'}; z-index: 1002; border-right: 1px solid #e1e1e1; border-bottom: 1px solid #e1e1e1;"></div>`);
            
            // Render letters A-K
            header.forEach((h, i) => {
                const isSelected = practiceState.selectedCol === i;
                let letterStyle = `grid-row: 1; grid-column: ${practiceState.outlineVisible ? i + 3 : i + 2}; position: sticky; top: 0; z-index: 1000; cursor: pointer;` +
                                    (isSelected ? ' background: rgba(33, 115, 70, 0.15) !important;' : '');
                
                colHeaders.push(`<div class="l-head letter ${isSelected ? 'l-sel' : ''}" style="${letterStyle}" data-col="${i}" onclick="selectCol(${i})">${colLetter(i)}</div>`);
            });
            // Extra letter for column mode
            if (t.uiType === 'column') {
                const extraColIdx = practiceState.outlineVisible ? header.length + 3 : header.length + 2;
                colHeaders.push(`<div class="l-head letter" style="grid-row: 1; grid-column: ${extraColIdx}; position: sticky; top: 0; z-index: 1000;" data-col="${header.length}">${colLetter(header.length)}</div>`);
            }

            // --- CSS Grid Row 2: Excel Row 1 (Category Names) ---
            const isRow1Frozen = practiceState.frozen; // Freeze top row affects Row 1
            const row1HeaderStyle = `grid-row: 2; grid-column: ${practiceState.outlineVisible ? 2 : 1}; position: sticky; left: ${practiceState.outlineVisible ? '40px' : '0'}; z-index: 900;` +
                                     (isRow1Frozen ? ` position: sticky !important; top: 32px !important; z-index: 1001 !important; background: #f4faf6 !important; border-bottom: 2px solid #217346 !important;` : '');
            if (practiceState.outlineVisible) {
                const outlineRow1Style = `grid-row: 2; grid-column: 1; position: sticky; left: 0; z-index: 901; display: flex; align-items: center; justify-content: center; font-size: 10px; color:#666; border-right: 1px solid #ddd; background:#f9f9f9; border-bottom:1px solid #f0f0f0;` +
                                         (isRow1Frozen ? ` position: sticky !important; top: 32px !important; z-index: 1001 !important;` : '');
                colHeaders.push(`<div style="${outlineRow1Style}"> |  </div>`);
            }
            colHeaders.push(`<div class="l-head r-1 ${isRow1Frozen ? 'frozen' : ''}" style="${row1HeaderStyle}">1</div>`);

            // Check if merged header is active
            const isHeaderMerged = (practiceState.mergedRange && practiceState.mergedRange.minRow === -1 && practiceState.mergedRange.maxRow === -1 && practiceState.mergedRange.minCol === 0 && practiceState.mergedRange.maxCol === 7);

            // Render Row 1 Category Cells
            header.forEach((h, i) => {
                const isSelectedCell = practiceState.selectedCell && practiceState.selectedCell.r === -1 && practiceState.selectedCell.c === i;
                const isSelectedCol = practiceState.selectedCol === i;
                
                let inRange = false;
                let shadows = [];
                if (practiceState.selectedRange) {
                    const minR = practiceState.selectedRange.minRow;
                    const maxR = practiceState.selectedRange.maxRow;
                    const minC = practiceState.selectedRange.minCol;
                    const maxC = practiceState.selectedRange.maxCol;
                    
                    if (-1 >= minR && -1 <= maxR && i >= minC && i <= maxC) {
                        inRange = true;
                        if (-1 === minR) shadows.push('inset 0 2px 0 0 #217346');
                        if (-1 === maxR) shadows.push('inset 0 -2px 0 0 #217346');
                        if (i === minC) shadows.push('inset 2px 0 0 0 #217346');
                        if (i === maxC) shadows.push('inset -2px 0 0 0 #217346');
                    }
                } else if (isSelectedCell) {
                    shadows.push('inset 0 2px 0 0 #217346', 'inset 0 -2px 0 0 #217346', 'inset 2px 0 0 0 #217346', 'inset -2px 0 0 0 #217346');
                }

                let cellStyle = `grid-row: 2; grid-column: ${practiceState.outlineVisible ? i + 3 : i + 2}; text-align: left; background-color: #f8f9fa; color: #333; line-height: 31px; border-right: 1px solid #e1e1e1; border-bottom: 1px solid #e1e1e1; padding: 0 10px; position: relative;` +
                                (isRow1Frozen ? ' position: sticky !important; top: 32px !important; z-index: 1000 !important; background: #f4faf6 !important; border-bottom: 2px solid #217346 !important;' : '');
                
                if (isSelectedCol) {
                    cellStyle += ' background: rgba(33, 115, 70, 0.08) !important;';
                }

                if (practiceState.hasHeaderFill) {
                    cellStyle += ' background-color: #fce4d6 !important; color: #333 !important;';
                }

                if (shadows.length > 0) {
                    cellStyle += ` box-shadow: ${shadows.join(', ')} !important; z-index: 5;`;
                }

                let filterArrow = "";
                if (practiceState.filterEnabled) {
                    filterArrow = `<button class="excel-filter-icon filter-arrow-btn" onmousedown="openFilterDropdown(event, ${i})" style="position: absolute; right: 0; bottom: 0; width: 16px; height: 16px; background: #f3f2f1; border: 1px solid #bbb; border-right: none; border-bottom: none; display: flex; align-items: center; justify-content: center; font-size: 7px; color: #333; cursor: pointer; padding: 0; z-index: 6;">▼</button>`;
                }

                if (isHeaderMerged) {
                    if (i === 0) {
                        const spanCols = t.uiType === 'column' ? 9 : 8;
                        cellStyle += ` grid-column: ${practiceState.outlineVisible ? 3 : 2} / span ${spanCols}; text-align: center; font-weight: bold; background: #fff !important;`;
                        colHeaders.push(`<div class="cell r-1 l-head letter ${inRange ? 'range-selected' : ''} ${practiceState.filterEnabled ? 'has-filter' : ''}" style="${cellStyle}" data-row="-1" data-col="${i}" onmousedown="onCellMouseDown(event, -1, ${i})" onmouseover="onCellMouseOver(event, -1, ${i})">${h}${filterArrow}</div>`);
                    }
                } else {
                    colHeaders.push(`<div class="cell r-1 ${isSelectedCell ? 'selected' : ''} ${inRange ? 'range-selected' : ''} ${isSelectedCol ? 'l-sel' : ''} ${practiceState.filterEnabled ? 'has-filter' : ''}" style="${cellStyle}" data-row="-1" data-col="${i}" onmousedown="onCellMouseDown(event, -1, ${i})" onmouseover="onCellMouseOver(event, -1, ${i})" oncontextmenu="onCellContextMenu(event, -1, ${i})">${h}${filterArrow}</div>`);
                }
            });

            // Extra Column 1 Header for column mode
            if (t.uiType === 'column') {
                const ansColIdx = practiceState.outlineVisible ? header.length + 3 : header.length + 2;
                const isSelectedCell = practiceState.selectedCell && practiceState.selectedCell.r === -1 && practiceState.selectedCell.c === header.length;
                let cellStyle = `grid-row: 2; grid-column: ${ansColIdx}; padding: 0 10px; font-weight: bold; background: #f8f9fa; line-height: 31px; border-right: 1px solid #e1e1e1; border-bottom: 1px solid #e1e1e1;` +
                                (isRow1Frozen ? ' position: sticky !important; top: 32px !important; z-index: 1000 !important; background: #f4faf6 !important; border-bottom: 2px solid #217346 !important;' : '');
                
                let shadows = [];
                if (isSelectedCell) {
                    shadows.push('inset 0 2px 0 0 #217346', 'inset 0 -2px 0 0 #217346', 'inset 2px 0 0 0 #217346', 'inset -2px 0 0 0 #217346');
                    cellStyle += ` box-shadow: ${shadows.join(', ')} !important; z-index: 5;`;
                }

                colHeaders.push(`<div class="cell r-1 ${isSelectedCell ? 'selected' : ''}" style="${cellStyle}" data-row="-1" data-col="${header.length}" onmousedown="onCellMouseDown(event, -1, ${header.length})">${t.answerHeader}</div>`);
            }

            // 3. Render Rows
            const gridCells = [];
            const rows = practiceState.displayRows;

            rows.forEach((row, i) => {
                const excelRowNumber = i + 2; // skip header (row 1)

                // Prepend Outline tree fold indicator cell
                if (practiceState.outlineVisible) {
                    const isSubtotalRow = row[2] && String(row[2]).includes("總計");
                    const indicator = isSubtotalRow ? '[-]─' : ' |  ';
                    gridCells.push(`<div style="grid-row: ${i + 3}; grid-column: 1; position: sticky; left: 0; z-index: 901; display: flex; align-items: center; justify-content: center; font-size: 10px; color:#666; border-right: 1px solid #ddd; background:#f9f9f9; border-bottom:1px solid #f0f0f0;">${indicator}</div>`);
                }

                // Row Header
                const rowHeaderLeft = practiceState.outlineVisible ? '40px' : '0';
                const rowHeaderStyle = `grid-row: ${i + 3}; grid-column: ${practiceState.outlineVisible ? 2 : 1}; position: sticky; left: ${rowHeaderLeft}; z-index: 900;`;
                gridCells.push(`<div class="l-head r-${excelRowNumber}" style="${rowHeaderStyle}">${excelRowNumber}</div>`);

                // Data Cells
                row.forEach((v, c) => {
                    const isSelectedCell = practiceState.selectedCell && practiceState.selectedCell.r === i && practiceState.selectedCell.c === c;
                    const isSelected = practiceState.selectedCol === c;
                    const isTarget = (t.uiType === 'single' && t.targetCell && t.targetCell.r === i && t.targetCell.c === c);
                    
                    let inRange = false;
                    let shadows = [];
                    if (practiceState.selectedRange) {
                        const minR = practiceState.selectedRange.minRow;
                        const maxR = practiceState.selectedRange.maxRow;
                        const minC = practiceState.selectedRange.minCol;
                        const maxC = practiceState.selectedRange.maxCol;
                        
                        if (i >= minR && i <= maxR && c >= minC && c <= maxC) {
                            inRange = true;
                            if (i === minR) shadows.push('inset 0 2px 0 0 #217346');
                            if (i === maxR) shadows.push('inset 0 -2px 0 0 #217346');
                            if (c === minC) shadows.push('inset 2px 0 0 0 #217346');
                            if (c === maxC) shadows.push('inset -2px 0 0 0 #217346');
                        }
                    } else if (isSelectedCell) {
                        shadows.push('inset 0 2px 0 0 #217346', 'inset 0 -2px 0 0 #217346', 'inset 2px 0 0 0 #217346', 'inset -2px 0 0 0 #217346');
                    }
                    
                    const cellClass = `cell r-${excelRowNumber} ${isSelectedCell ? 'selected' : ''} ${inRange ? 'range-selected' : ''} ${isSelected ? 'l-sel' : ''} ${isTarget ? 'task-target-cell' : ''}`;
                    const cellColIdx = practiceState.outlineVisible ? c + 3 : c + 2;
                    let cellStyle = `grid-row: ${i + 3}; grid-column: ${cellColIdx}; text-align: ${isNaN(v) ? 'left' : 'right'};`;
                    
                    if (shadows.length > 0) {
                        cellStyle += ` box-shadow: ${shadows.join(', ')} !important; z-index: 5;`;
                    }
                    
                    // Format painter formatting styles
                    if (t.skillId === 'FORMAT') {
                        if (i === 0 || practiceState.painterApplied) {
                            cellStyle += ' background-color: #fff9c4 !important; border: 1.5px solid #217346 !important;';
                        }
                    }
                    
                    // Custom border highlights
                    if (practiceState.hasBorders) {
                        cellStyle += ' border: 1px solid #333 !important;';
                    }
                    
                    // Highlight fuzzy search cell matches or other cellHighlights
                    const highlight = (practiceState.cellHighlights && practiceState.cellHighlights[`${i}-${c}`]);
                    if (highlight) {
                        cellStyle += ` background-color: ${highlight.backgroundColor} !important; color: ${highlight.color} !important; font-weight: ${highlight.fontWeight} !important;`;
                    }
                    
                    gridCells.push(`<div class="${cellClass}" style="${cellStyle}" data-row="${i}" data-col="${c}" onmousedown="onCellMouseDown(event, ${i}, ${c})" onmouseover="onCellMouseOver(event, ${i}, ${c})" oncontextmenu="onCellContextMenu(event, ${i}, ${c})">${v}</div>`);
                });

                // Answer Column Input Cell
                if (t.uiType === 'column') {
                    const isSelectedCell = practiceState.selectedCell && practiceState.selectedCell.r === i && practiceState.selectedCell.c === (header.length);
                    const ansColIdx = practiceState.outlineVisible ? header.length + 3 : header.length + 2;
                    let cellStyle = `grid-row: ${i + 3}; grid-column: ${ansColIdx}; padding: 0;`;
                    let shadows = [];
                    if (isSelectedCell) {
                        shadows.push('inset 0 2px 0 0 #217346', 'inset 0 -2px 0 0 #217346', 'inset 2px 0 0 0 #217346', 'inset -2px 0 0 0 #217346');
                        cellStyle += ` box-shadow: ${shadows.join(', ')} !important; z-index: 5;`;
                    }
                    
                    if (practiceState.hasBorders) {
                        cellStyle += ' border: 1px solid #333 !important;';
                    }
                    
                    const val = (practiceState.inputValues && practiceState.inputValues[i] !== undefined) ? practiceState.inputValues[i] : '';
                    
                    gridCells.push(`
                        <div class="cell r-${excelRowNumber} answer-col ${isSelectedCell ? 'selected-cell' : ''}" style="${cellStyle}" data-row="${i}" data-col="${header.length}" onmouseover="onAnswerCellMouseOver(event, ${i})">
                            <input type="text" class="grid-cell-input" id="ans-${i}" placeholder="輸入公式或數值" value="${escapeHtmlAttr(val)}" onfocus="onInputFocus(event, ${i})" onblur="onInputBlur(event)" oninput="onInputChange(event, ${i})" onkeydown="onInputKeyDown(event, ${i})">
                            ${isSelectedCell ? `<div class="fill-handle" onmousedown="onFillHandleMouseDown(event, ${i})"></div>` : ''}
                        </div>
                    `);
                }
            });

            // Single mode bottom input row
            if (t.uiType === 'single') {
                const bottomRowNumber = rows.length + 2;
                const rowHeaderLeft = practiceState.outlineVisible ? '40px' : '0';
                if (practiceState.outlineVisible) {
                    gridCells.push(`<div style="grid-row: ${bottomRowNumber + 1}; grid-column: 1; position: sticky; left: 0; z-index: 901; background:#f9f9f9; border-right:1px solid #ddd; border-bottom:1px solid #f0f0f0;"></div>`);
                }
                gridCells.push(`<div class="l-head r-${bottomRowNumber}" style="grid-row: ${bottomRowNumber + 1}; grid-column: ${practiceState.outlineVisible ? 2 : 1}; position: sticky; left: ${rowHeaderLeft}; z-index: 900;">${bottomRowNumber}</div>`);

        function executeFind() {
            const val = document.getElementById('fr-find').value.trim();
            if (!val) return;
            const rows = practiceState.displayRows;
            
            let startR = 0;
            if (practiceState.selectedCell) {
                startR = (practiceState.selectedCell.r + 1) % rows.length;
            }
            
            const regex = new RegExp('^' + val.replace(/\*/g, '.*').replace(/\?/g, '.') + '$', 'i');
            const isFuzzy = val.includes('*') || val.includes('?');
            
            for (let count = 0; count < rows.length; count++) {
                let r = (startR + count) % rows.length;
                for (let c = 0; c < rows[r].length; c++) {
                    const cellVal = String(rows[r][c] || "");
                    if (isFuzzy ? regex.test(cellVal) : cellVal.includes(val)) {
                        selectCell(r, c);
                        
                        if (currentTask.skillId === 'SEARCH' && cellVal === currentTask.correctAnswer) {
                            practiceState.searchFound = true;
                            showFeedback(true);
                        }
                        return;
                    }
                }
            }
            alert("找不到項目：" + val);
        }

        function executeFindAll() {
            const val = document.getElementById('fr-find').value.trim();
            if (!val) return;
            const rows = practiceState.displayRows;
            
            const regex = new RegExp('^' + val.replace(/\*/g, '.*').replace(/\?/g, '.') + '$', 'i');
            const isFuzzy = val.includes('*') || val.includes('?');
            
            if (currentTask.skillId === 'FUZZY') {
                if (!isFuzzy) {
                    showFeedbackMessage(false, "❌ 模糊搜尋任務必須使用萬用字元（如 *）！");
                    return;
                }
                if (!_frSelectedFormat) {
                    showFeedbackMessage(false, "❌ 模糊搜尋任務前，請點選「選項 >>」設定高亮格式！");
                    return;
                }
            }
            
            let matches = 0;
            if (!practiceState.cellHighlights) practiceState.cellHighlights = {};
            
            for (let r = 0; r < rows.length; r++) {
                for (let c = 0; c < rows[r].length; c++) {
                    const cellVal = String(rows[r][c] || "");
                    if (isFuzzy ? regex.test(cellVal) : cellVal.includes(val)) {
                        matches++;
                        if (_frSelectedFormat) {
                            practiceState.cellHighlights[`${r}-${c}`] = _frSelectedFormat;
                        }
                    }
                }
            }
            
            renderTask();
            
            if (currentTask.skillId === 'FUZZY') {
                if (val === currentTask.correctAnswer) {
                    showFeedback(true);
                } else {
                    showFeedbackMessage(false, "❌ 搜尋條件不符合題目要求（應該是：" + currentTask.correctAnswer + "）");
                }
            }
        }

        function executeReplace(all = true) {
            const oldVal = document.getElementById('fr-find').value.trim();
            const newVal = document.getElementById('fr-replace').value.trim();
            if (!oldVal) return;
            
            if (currentTask.skillId === 'REPLACE') {
                if (oldVal !== currentTask.correctAnswer.oldVal || newVal !== currentTask.correctAnswer.newVal) {
                    showFeedbackMessage(false, `❌ 取代值不對！應將「${currentTask.correctAnswer.oldVal}」取代為「${currentTask.correctAnswer.newVal}」。`);
                    return;
                }
            }
            
            const rows = practiceState.displayRows;
            let replacedCount = 0;
            
            for (let r = 0; r < rows.length; r++) {
                for (let c = 0; c < rows[r].length; c++) {
                    if (String(rows[r][c]) === oldVal) {
                        rows[r][c] = newVal;
                        replacedCount++;
                        if (!all) break;
                    }
                }
                if (!all && replacedCount > 0) break;
            }
            
            renderTask();
            
            if (currentTask.skillId === 'REPLACE') {
                showFeedback(true);
            }
        }

        // Multi-sort & custom sort
        let _sortLevels = [];
        let _activeSortOrderSelect = null;

        function openSortDialog() {
            const modal = document.getElementById('excel-sort-modal');
            const body = document.getElementById('sort-levels-body');
            if (!modal || !body) return;

            if (!_sortLevels || _sortLevels.length === 0) {

        function addSortLevel() {
            const body = document.getElementById('sort-levels-body');
            if (!body) return;
            const row = document.createElement('tr');
            const levelIdx = _sortLevels ? _sortLevels.length : 0;
            
            const headers = currentTask.table.header;
            const colOptions = headers.map((h, i) => `<option value="${i}">${h}</option>`).join('');

            row.innerHTML = `
                <td style="padding:5px; border-right:1px solid #eee;">

                        <option>值</option>
                    </select>
                </td>
                <td style="padding:5px;">
                    <select class="sort-order" onchange="handleSortOrderChange(this, ${levelIdx})" style="width:100%; border:1px solid #ccc; font-size:11px; color:#333;">
                        <option value="asc">A 到 Z</option>
                        <option value="desc">Z 到 A</option>
                        <option value="custom">自訂清單...</option>
                    </select>
                </td>
            `;

            body.appendChild(row);
            if (!_sortLevels) _sortLevels = [];
            _sortLevels.push(row);
