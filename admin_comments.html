<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>冒險者留言板 - 管理後台</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            background: #1e1e2e;
            color: #fdf5e6;
            padding: 40px;
            font-family: sans-serif;
            overflow-y: auto;
            height: auto;
        }
        .admin-container {
            max-width: 1000px;
            margin: 0 auto;
        }
        h1 {
            color: var(--gold);
            text-align: center;
            border-bottom: 2px solid var(--gold);
            padding-bottom: 20px;
            margin-bottom: 40px;
        }
        .feedback-item {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 215, 0, 0.3);
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 20px;
            position: relative;
        }
        .feedback-header {
            display: flex;
            justify-content: space-between;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 10px;
            margin-bottom: 15px;
        }
        .p-name {
            font-weight: bold;
            color: var(--gold);
            font-size: 1.2em;
        }
        .p-date {
            font-size: 0.9em;
            color: #888;
        }
        .p-comment {
            line-height: 1.6;
            white-space: pre-wrap;
        }
        .no-data {
            text-align: center;
            font-style: italic;
            color: #666;
            margin-top: 50px;
        }
        .actions {
            margin-top: 40px;
            display: flex;
            gap: 20px;
            justify-content: center;
        }
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }
        .btn-clear { background: #b22222; color: #fff; }
        .btn-back { background: #217346; color: #fff; }
    </style>
</head>
<body>
    <div class="admin-container">
        <h1>🔍 冒險者留言板（僅站長可見）</h1>

        <div id="auth-gate">
            <p style="text-align:center;margin-bottom:15px;">請輸入管理密碼以查看留言：</p>
            <div style="display:flex;gap:10px;justify-content:center;">
                <input type="password" id="admin-password" placeholder="密碼" style="padding:10px;border-radius:5px;border:1px solid var(--gold);background:#2a2a3d;color:#fff;">
                <button class="btn btn-back" onclick="checkPassword()">進入</button>
            </div>
            <p id="auth-error" style="color:#ff6b6b;text-align:center;margin-top:10px;display:none;">密碼錯誤，請再試一次。</p>
        </div>

        <div id="comments-wrapper" style="display:none;">
            <div id="comments-list">
                <!-- 留言會由 JS 動態插入 -->
            </div>

            <div class="actions">
                <button class="btn btn-back" onclick="window.location.href='game.html'">⬅ 返回遊戲</button>
                <button class="btn btn-clear" onclick="clearComments()">🗑 清空所有留言</button>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
    <script src="code/firebase-config.js"></script>
    <script>
        // ⚠️ 請把這裡改成只有你自己知道的密碼
        const ADMIN_PASSWORD = '1029384756';

        function checkPassword() {
            const input = document.getElementById('admin-password').value;
            if (input === ADMIN_PASSWORD) {
                sessionStorage.setItem('admin_authed', '1');
                document.getElementById('auth-gate').style.display = 'none';
                document.getElementById('comments-wrapper').style.display = 'block';
                loadComments();
            } else {
                document.getElementById('auth-error').style.display = 'block';
            }
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function loadComments() {
            const listDiv = document.getElementById('comments-list');
            listDiv.innerHTML = '<p class="no-data">載入中...</p>';

            const readPromise = window.db.collection(window.FEEDBACK_COLLECTION).orderBy('timestamp', 'desc').get();
            const timeoutPromise = new Promise((_, reject) => {
                setTimeout(() => reject(new Error('timeout')), 8000);
            });

            Promise.race([readPromise, timeoutPromise])
                .then((snapshot) => {
                    if (snapshot.empty) {
                        listDiv.innerHTML = '<p class="no-data">目前尚無冒險者留言...</p>';
                        return;
                    }
                    listDiv.innerHTML = snapshot.docs.map(doc => {
                        const item = doc.data();
                        return `
                            <div class="feedback-item">
                                <div class="feedback-header">
                                    <span class="p-name">👤 ${escapeHtml(item.name || '匿名冒險者')}</span>
                                    <span class="p-date">📅 ${escapeHtml(item.date || '')}</span>
                                </div>
                                <div class="p-comment">${escapeHtml(item.comment || '')}</div>
                            </div>
                        `;
                    }).join('');
                })
                .catch((err) => {
                    console.error('Load comments failed:', err);
                    listDiv.innerHTML = '<p class="no-data">⚠️ 留言載入失敗，請確認 Firebase 設定與網路連線。</p>';
                });
        }

        function clearComments() {
            if (!confirm('確定要清除所有魔法留言嗎？此動作無法復原。')) return;

            window.db.collection(window.FEEDBACK_COLLECTION).get().then((snapshot) => {
                const deletes = snapshot.docs.map(doc => doc.ref.delete());
                return Promise.all(deletes);
            }).then(() => {
                loadComments();
            }).catch((err) => {
                console.error('Clear comments failed:', err);
                alert('清空失敗，請稍後再試。');
            });
        }

        // 同一個瀏覽器分頁內，已經驗證過密碼就不用再輸入一次
        if (sessionStorage.getItem('admin_authed') === '1') {
            document.getElementById('auth-gate').style.display = 'none';
            document.getElementById('comments-wrapper').style.display = 'block';
            loadComments();
        }
    </script>
</body>
</html>
