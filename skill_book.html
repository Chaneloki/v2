<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>試算表魔法冒險 - 實戰魔導書</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700;900&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        /* 技能書獨立頁面美化樣式 */
        body {
            margin: 0; padding: 0;
            background: radial-gradient(circle at center, #10b0b8a9 0%, #d2bb0bc7 100%);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100vh; overflow: hidden;
            font-family: 'Inter', 'Noto Serif TC', serif;
            color: #203c2b;
        }

        /* 頂部返回按鈕 */
        .return-btn {
            position: absolute; top: 5px; right: 28px;
            padding: 8px 20px; background: rgba(206, 21, 21, 0.619);
            color: #ffffff; border-radius: 20px;
            font-weight: bold; cursor: pointer; text-decoration: none;
            transition: all 0.22s; z-index: 100;
            font-size: 0.88rem;
            backdrop-filter: blur(10px);
        }
        .return-btn:hover { background: #ff0000; color: #fff; box-shadow: 0 0 15px rgba(140, 98, 57, 0.3); }

        .grimoire-layout.standalone-grimoire {
            width: 95vw !important;
            height: 90vh !important;
            max-width: 1400px !important;
            background: rgba(249, 154, 2, 0.283) !important;
            border: 2px solid rgb(0, 0, 0) !important;
            border-radius: 16px !important;
            box-shadow: 0 20px 60px rgb(0, 0, 0) !important;
            overflow: hidden !important;
            display: flex;
            position: relative;
        }

        /* 背景水彩層 */
        .grimoire-bg-overlay {
            position: absolute; inset: 0;
            background: url('BG/intro/2_bg.png') center/cover no-repeat;
            opacity: 0.5;
            pointer-events: none;
            z-index: 0;
            filter: grayscale(20%) blur(0px);
        }

        .grimoire-left {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: transparent !important;
            border-right: none !important;
            z-index: 1;
            position: relative;
        }

        #s-header {
            padding: 12px 30px !important;
            background: rgba(165, 121, 27, 0.377) !important;
            border-bottom: 1px solid rgba(156, 101, 13, 0.301) !important;
        }
        .header-main-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        #s-header h3 {
            margin: 0;
            font-size: 1.35rem;
            color: #ffffff;
            font-family: 'Noto Serif TC', serif;
            font-weight: 900;
            letter-spacing: 2px;
            text-shadow: 0 1px 2px rgba(0,0,0,0.05);
        }
        .grimoire-subtitle {
            margin: 2px 0 0 0;
            font-size: 0.8rem;
            color: #ffffff;
        }
        #progress-text {
            font-size: 0.85rem;
            color: #ffffff;
            font-weight: bold;
        }

        /* 控制列：合併分頁與搜尋 */
        .grimoire-controls {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(229, 245, 222, 0.45) !important;
            border-bottom: 1px solid rgba(192, 142, 64, 0.2) !important;
            padding: 6px 30px !important;
            gap: 20px;
            z-index: 10;
        }
        .grimoire-tabs {
            display: flex;
            gap: 8px;
        }
        .skill-tab {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 6px 12px;
            background: rgba(128, 215, 138, 0.6);
            border: 1px solid rgb(0, 0, 0);
            border-radius: 8px;
            cursor: pointer;
            color: #6e494f;
            transition: all 0.2s;
        }
        .skill-tab:hover {
            background: rgb(0, 252, 63);
            border-color: rgb(0, 0, 0);
            color: #554433;
        }
        .skill-tab.active {
            background: rgba(183, 34, 44, 0.58);
            border-color: #000000;
            color: #8c6239;
            box-shadow: 0 0 8px rgba(192, 142, 64, 0.1);
        }
        .tab-icon { font-size: 1rem; }
        .tab-text { font-size: 0.8rem; font-weight: bold; }

        /* 搜尋欄 */
        #s-search-box {
            flex: 1;
            max-width: 320px;
        }
        #skill-search {
            width: 100%;
            padding: 6px 14px;
            border: 1px solid rgb(0, 0, 0);
            border-radius: 20px;
            font-size: 0.8rem;
            outline: none;
            background: rgba(255, 255, 255, 0.105);
            color: #3c3020;
            box-sizing: border-box;
            transition: all 0.2s;
        }
        #skill-search::placeholder {
            color: rgba(60, 48, 32, 0.5);
        }
        #skill-search:focus {
            border-color: #8c6239;
            box-shadow: 0 0 10px rgba(192, 142, 64, 0.15);
        }

        /* 樹形畫布區域 */
        .tree-viewport-container {
            flex: 1;
            overflow: auto;
            position: relative;
            background: rgba(255, 255, 255, 0);
        }

        /* 樹狀分層背景 */
        .tree-grid-background {
            position: absolute; inset: 0;
            display: flex;
            pointer-events: none;
            z-index: 0;
        }
        .tree-grid-col {
            flex: 1;
            border-right: 1px dashed rgba(64, 192, 87, 0.2);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding-top: 8px;
            box-sizing: border-box;
        }
        .tree-grid-col-title {
            font-size: 15px;
            color: rgb(0, 0, 0);
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .tree-canvas {
            position: relative;
            width: 1300px;
            height: 480px;
            z-index: 1;
        }

        /* SVG 連線層 */
        .tree-connections-svg {
            position: absolute; inset: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 2;
        }
        .tree-link {
            fill: none;
            stroke: rgba(236, 236, 2, 0.393);
            stroke-width: 3;
            transition: stroke 0.22s, stroke-width 0.22s, filter 0.22s;
        }
        .tree-link.unlocked {
            stroke: rgb(18, 223, 131);
            stroke-width: 3.5;
        }
        .tree-link.highlight-upstream {
            stroke: #b37400;
            stroke-width: 3.5;
            filter: drop-shadow(0 0 3px rgba(179, 116, 0, 0.4));
        }
        .tree-link.highlight-downstream {
            stroke: #1e7e34;
            stroke-width: 3.5;
            filter: drop-shadow(0 0 3px rgba(30, 126, 52, 0.4));
        }

        .tree-node-card {
            position: absolute;
            width: 120px;
            height: 52px;
            border-radius: 10px;
            background: linear-gradient(135deg, #ffffff 0%, #f7f3eb 100%);
            border: 1.5px solid rgba(192, 142, 64, 0.4);
            box-shadow: 0 4px 12px rgba(110, 80, 40, 0.08);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-sizing: border-box;
            z-index: 5;
            transition: all 0.2s cubic-bezier(0.2, 0.8, 0.2, 1);
            user-select: none;
        }
        .tree-node-card:hover {
            transform: scale(1.06) translateY(-2px);
            border-color: rgba(192, 142, 64, 0.8);
            box-shadow: 0 8px 24px rgba(192, 142, 64, 0.15);
        }
        .tree-node-card.unlocked {
            background: linear-gradient(135deg, #eaf6ed 0%, #d5eedc 100%) !important;
            border: 1.8px solid #28a745 !important;
            box-shadow: 0 4px 12px rgba(40, 167, 69, 0.12) !important;
        }
        .tree-node-card.unlocked .node-name-label {
            color: #155724 !important;
            text-shadow: none !important;
        }
        .tree-node-card.active {
            border-color: #ff9900 !important;
            background: linear-gradient(135deg, #fef8eb 0%, #fbe8c5 100%) !important;
            box-shadow: 0 0 18px rgba(255, 153, 0, 0.3) !important;
        }
        .tree-node-card.locked {
            border-color: rgba(192, 142, 64, 0.3);
            background: rgba(255, 255, 255, 0.45);
            opacity: 0.75;
            border-style: dashed;
        }
        .tree-node-card.locked:hover {
            opacity: 0.90;
            border-color: rgba(192, 142, 64, 0.6);
            background: rgba(255, 255, 255, 0.65);
        }
        
        .node-name-label {
            font-size: 0.8rem;
            font-weight: 700;
            color: #4e3f2e;
            text-align: center;
            line-height: 1.3;
            margin-bottom: 2px;
            max-width: 90%;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .tree-node-card.locked .node-name-label {
            color: #8a7a66;
        }
        .node-badge {
            font-size: 9px;
            padding: 1px 6px;
            border-radius: 8px;
            font-weight: bold;
            color: #155724;
            background: rgba(40, 167, 69, 0.12);
            border: 1px solid rgba(40, 167, 69, 0.2);
        }
        .tree-node-card.locked .node-badge {
            display: none;
        }
        .node-lock-icon {
            font-size: 11px;
            color: #8a7a66;
            margin-top: 2px;
            display: none;
        }
        .tree-node-card.locked .node-lock-icon {
            display: block;
        }

        /* 右側詳情面板 */
        /* 技能詳情彈窗樣式 */
        .grimoire-detail-modal {
            position: absolute !important;
            inset: 0 !important;
            background: rgba(60, 50, 40, 0.45) !important;
            backdrop-filter: blur(8px) !important;
            display: flex;
            align-items: center !important;
            justify-content: center !important;
            z-index: 1000 !important;
            animation: fadeIn 0.25s ease !important;
        }

        .grimoire-detail-modal-content {
            width: 480px !important;
            max-width: 90% !important;
            max-height: 85% !important;
            background: rgba(255, 254, 250, 0.98) !important;
            border: 2px solid rgba(192, 142, 64, 0.5) !important;
            border-radius: 16px !important;
            box-shadow: 0 15px 40px rgba(110, 80, 40, 0.25) !important;
            padding: 30px 25px !important;
            position: relative !important;
            box-sizing: border-box !important;
            display: flex !important;
            flex-direction: column !important;
            gap: 15px !important;
            animation: zoomIn 0.22s cubic-bezier(0.18, 0.89, 0.32, 1.28) !important;
        }

        .grimoire-detail-modal-close {
            position: absolute !important;
            top: 15px !important;
            right: 15px !important;
            background: none !important;
            border: none !important;
            color: rgba(60, 50, 40, 0.6) !important;
            font-size: 20px !important;
            cursor: pointer !important;
            transition: color 0.18s !important;
            z-index: 10 !important;
        }

        .grimoire-detail-modal-close:hover {
            color: #c08e40 !important;
        }

        #s-detail-panel {
            display: flex !important;
            flex-direction: column !important;
            overflow-y: auto !important;
            flex: 1 !important;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        @keyframes zoomIn {
            from { transform: scale(0.92); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }
        .detail-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 24px;
        }
        .detail-icon {
            width: 52px; height: 52px;
            border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.5rem;
            background: #ffeeb3 !important;
            color: #7c5210 !important;
            box-shadow: 0 0 10px rgba(192, 142, 64, 0.2);
            font-weight: bold;
        }
        .detail-title h2 {
            margin: 0 0 4px 0;
            font-size: 1.3rem;
            color: #8c6239;
            font-family: 'Noto Serif TC', serif;
            font-weight: 700;
        }
        .detail-badge {
            padding: 2px 8px;
            border-radius: 6px;
            font-size: 10px;
            font-weight: bold;
            color: #fff;
        }

        .detail-body { flex: 1; display: flex; flex-direction: column; gap: 18px; }
        .detail-section {
            padding: 14px 16px;
            border-radius: 10px;
            box-sizing: border-box;
        }
        .detail-section h4 {
            margin: 0 0 8px 0;
            font-size: 0.85rem;
            border-bottom: 1px dashed rgba(60, 50, 40, 0.15);
            padding-bottom: 6px;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .detail-section p {
            margin: 0;
            font-size: 0.84rem;
            line-height: 1.6;
        }

        /* 痛點色卡 */
        .pain-point {
            background: rgba(239, 68, 68, 0.04) !important;
            border: 1px solid rgba(239, 68, 68, 0.18) !important;
        }
        .pain-point h4 { color: #c53030 !important; border-color: rgba(239, 68, 68, 0.1) !important; }
        .pain-point p { color: #9b1c1c !important; }

        /* 效果與路徑色卡 */
        .effect {
            background: rgba(33, 115, 70, 0.04) !important;
            border: 1px solid rgba(33, 115, 70, 0.18) !important;
        }
        .effect h4 { color: #1e7e34 !important; border-color: rgba(33, 115, 70, 0.1) !important; }
        .effect p { color: #155724 !important; }
        .spell-shortcut {
            margin-top: 10px;
            padding: 8px 12px;
            background: rgba(255, 255, 255, 0.6) !important;
            border: 1px solid rgba(192, 142, 64, 0.18) !important;
            border-radius: 6px;
            font-size: 0.82rem;
            color: #5c4e3c;
        }
        kbd {
            background: rgba(192, 142, 64, 0.08) !important;
            padding: 2px 6px;
            border-radius: 4px;
            border: 1px solid rgba(192, 142, 64, 0.25) !important;
            border-bottom: 2px solid rgba(192, 142, 64, 0.4) !important;
            font-weight: bold;
            color: #7c5210 !important;
            font-family: inherit;
        }

        /* 賽爾叮嚀 */
        .ciel-tips {
            background: rgba(245, 158, 11, 0.04) !important;
            border: 1px solid rgba(245, 158, 11, 0.18) !important;
        }
        .ciel-tips h4 { color: #b45309 !important; border-color: rgba(245, 158, 11, 0.1) !important; }
        .ciel-tips p { color: #78350f !important; font-style: italic; }

        /* 技能脈絡關係 */
        .skill-context-box {
            background: rgba(245, 240, 230, 0.4) !important;
            border: 1px solid rgba(192, 142, 64, 0.15) !important;
        }
        .skill-context-box h4 { color: #7c6c58 !important; border-color: rgba(192, 142, 64, 0.08) !important; }
        .context-link {
            color: #b37400 !important;
            text-decoration: underline;
            cursor: pointer;
            font-weight: bold;
            transition: color 0.18s;
        }
        .context-link:hover {
            color: #e05c00;
        }

        /* 教學重播按鈕 */
        .detail-footer {
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid rgba(0,0,0,0.06);
        }
        .review-btn {
            width: 100%; padding: 12px;
            background: linear-gradient(135deg, #e08b2b, #b85c00) !important;
            color: white !important; border: none; border-radius: 8px;
            font-size: 0.92rem; font-weight: bold; cursor: pointer;
            transition: all 0.18s;
            box-shadow: 0 4px 0 #8c4200 !important;
        }
        .review-btn:hover {
            transform: translateY(2px);
            box-shadow: 0 2px 0 #8c4200 !important;
            filter: brightness(1.08);
        }
        .review-btn:active {
            transform: translateY(4px);
            box-shadow: 0 0 0 #8c4200 !important;
        }

        .locked-panel {
            text-align: center; color: #7c6c58;
            margin-top: 120px;
        }
        .locked-icon { font-size: 3.5rem; margin-bottom: 15px; opacity: 0.7; color: #c08e40; }
        .locked-panel h3 { font-size: 1.1rem; color: #5c4e3c; margin-bottom: 8px; }
        .locked-panel p { font-size: 0.8rem; line-height: 1.6; max-width: 80%; margin: 0 auto; }
    </style>
</head>
<body>

    <a href="game.html?action=load" class="return-btn">⬅ 返回並讀取記憶 (Load Save)</a>

    <div class="grimoire-layout standalone-grimoire" id="s-card">
        <div class="grimoire-bg-overlay"></div>
        
        <div class="grimoire-left">
            <div id="s-header">
                <div class="header-main-row">
                    <h3>📖 實戰魔導書</h3>
                    <div id="progress-text">已領悟技能：0 / 0 (0%)</div>
                </div>
                <p class="grimoire-subtitle">以關卡所面臨的實戰難題為導向，尋找對應的試算表解決技能。</p>
            </div>
            
            <div class="grimoire-controls">
                <div id="s-tabs" class="grimoire-tabs">
                    <button class="skill-tab active" onclick="setCategoryFilter('layout', this)">
                        <div class="tab-icon">📦</div>
                        <div class="tab-text">版面與可讀性</div>
                    </button>
                    <button class="skill-tab" onclick="setCategoryFilter('query', this)">
                        <div class="tab-icon">🔍</div>
                        <div class="tab-text">搜尋與檢索</div>
                    </button>
                    <button class="skill-tab" onclick="setCategoryFilter('entry', this)">
                        <div class="tab-icon">⚡</div>
                        <div class="tab-text">輸入與資料防錯</div>
                    </button>
                    <button class="skill-tab" onclick="setCategoryFilter('calc', this)">
                        <div class="tab-icon">🧮</div>
                        <div class="tab-text">計算與統計分析</div>
                    </button>
                </div>
                
                <div id="s-search-box">
                    <input type="text" id="skill-search" placeholder="輸入關鍵字、操作步驟或技能名稱搜尋..." oninput="renderTree()">
                </div>
            </div>
            
            <!-- 滾動樹狀視窗 -->
            <div class="tree-viewport-container" id="tree-viewport">
                <div class="tree-grid-background" id="tree-grid-bg">
                    <!-- 由 JS 動態注入 Tier 分欄背景 -->
                </div>
                <div class="tree-canvas" id="tree-canvas-area">
                    <!-- SVG 連線 -->
                    <svg class="tree-connections-svg" id="tree-svg"></svg>
                    <!-- 節點卡片由 JS 動態生成 -->
                </div>
            </div>
        </div>
        
        <!-- 技能詳情彈窗 -->
        <div id="s-detail-modal" class="grimoire-detail-modal" style="display:none">
            <div class="grimoire-detail-modal-content">
                <button onclick="closeDetailModal()" class="grimoire-detail-modal-close">✕</button>
                <div id="s-detail-panel">
                    <!-- 詳情內容由 JS 動態生成 -->
                </div>
            </div>
        </div>
    </div>

    <!-- 載入所有章節數據以獲取 skillDefs -->
    <script src="chapter/ch1.js"></script>
    <script src="chapter/ch1_5.js"></script>
    <script src="chapter/ch2.js"></script>
    <script src="chapter/ch2.5.js"></script>
    <script src="chapter/ch3.js"></script>
    <script src="chapter/ch3.5.js"></script>
    <script src="chapter/ch4.js"></script>
    <script src="chapter/ch4.5.js"></script>
    <script src="chapter/ch5.js"></script>
    <script src="chapter/ch5.5.js"></script>
    <script src="chapter/ch6.js"></script>
    <script src="chapter/ch6.5.js"></script>
    <script src="chapter/ch7.js"></script>
    <script src="chapter/ch7.5.js"></script>
    <script src="chapter/ch8.js"></script>
    <script src="chapter/ch8_5.js"></script>

    <script>
        // 技能樹結構定義 (對齊實用層級與學習進度)
        const TreeStructures = {
            layout: {
                title: "📦 版面與可讀性難題",
                subtitle: "解決表格長度過大導致標題消失、欄位錯亂與排版雜亂等閱讀問題。",
                tiers: ["Tier 1: 核心固定", "Tier 2: 分類結構", "Tier 3: 標題對齊", "Tier 4: 視覺美化", "Tier 5: 快速拓印"],
                nodes: [
                    { id: "F", x: 60, y: 140, tier: 1 },
                    { id: "SWAP", x: 260, y: 60, tier: 2 },
                    { id: "S", x: 260, y: 220, tier: 2 },
                    { id: "MERGE_CENTER", x: 460, y: 140, tier: 3 },
                    { id: "BORDER", x: 660, y: 60, tier: 4 },
                    { id: "FILL_COLOR", x: 660, y: 220, tier: 4 },
                    { id: "FORMAT", x: 860, y: 140, tier: 5 }
                ],
                connections: [
                    { from: "F", to: "SWAP" },
                    { from: "F", to: "S" },
                    { from: "SWAP", to: "MERGE_CENTER" },
                    { from: "S", to: "MERGE_CENTER" },
                    { from: "MERGE_CENTER", to: "BORDER" },
                    { from: "MERGE_CENTER", to: "FILL_COLOR" },
                    { from: "BORDER", to: "FORMAT" },
                    { from: "FILL_COLOR", to: "FORMAT" }
                ]
            },
            query: {
                title: "🔍 搜尋與檢索難題",
                subtitle: "在大海撈針的巨量旅客名冊中，精確定位、改寫或篩選符合條件的資料列。",
                tiers: ["Tier 1: 導航躍遷", "Tier 2: 定位排序", "Tier 3: 批次篩選", "Tier 4: 模糊與多重", "Tier 5: 複雜過濾"],
                nodes: [
                    { id: "NAV", x: 60, y: 140, tier: 1 },
                    { id: "SEARCH", x: 260, y: 60, tier: 2 },
                    { id: "SORT_SIMPLE", x: 260, y: 220, tier: 2 },
                    { id: "REPLACE", x: 460, y: 60, tier: 3 },

        // 賽爾貼心生存指南吐槽庫

        let currentCategory = 'layout';
        let unlockedSkills = [];
        let allSkillDefs = {};

        document.addEventListener("DOMContentLoaded", () => {
            // 1. 彙整所有章節的 skillDefs 定義
            if (window.V2_CHAPTERS) {
                const sortedChapterIds = Object.keys(window.V2_CHAPTERS).sort((a, b) => parseFloat(a) - parseFloat(b));
                sortedChapterIds.forEach(chId => {
                    const ch = window.V2_CHAPTERS[chId];
                    if (ch && ch.skillDefs) {
                        Object.assign(allSkillDefs, ch.skillDefs);
                    }
                });
            }

            // 2. 從 localStorage 載入解鎖紀錄
            const metaRaw = localStorage.getItem('magic_excel_v2_meta');
            if (metaRaw) {
                try {
                    const meta = JSON.parse(metaRaw);
                    const lastSlot = meta.lastPlayedSlot || 'auto';
                    const saveKey = lastSlot === 'auto' ? 'magic_excel_v2_save' : `magic_excel_v2_save_${lastSlot}`;
                    const saveRaw = localStorage.getItem(saveKey);
                    if (saveRaw) {
                        const saveData = JSON.parse(saveRaw);
                        if (saveData.unlockedSkills) {
                            unlockedSkills = saveData.unlockedSkills;
                        }
                    }
                } catch(e) { console.error("Error loading save:", e); }
            }

            // Fallback
            if (unlockedSkills.length === 0) {
                ['auto', 'manual_1', 'manual_2'].forEach(slot => {
                    const key = slot === 'auto' ? 'magic_excel_v2_save' : `magic_excel_v2_save_${slot}`;
                    const raw = localStorage.getItem(key);
                    if (raw) {
                        try {
                            const data = JSON.parse(raw);
                            if (data.unlockedSkills && data.unlockedSkills.length > unlockedSkills.length) {
                                unlockedSkills = data.unlockedSkills;
                            }
                        } catch(e) {}
                    }
                });
            }

            // 更新進度條文字
            const totalCount = Object.keys(allSkillDefs).length || 24;
            const progressPercent = Math.round((unlockedSkills.length / totalCount) * 100);
            document.getElementById('progress-text').innerText = `已領悟技能：${unlockedSkills.length} / ${totalCount} (${progressPercent}%)`;

            // 點擊彈窗背景關閉彈窗
            const modal = document.getElementById('s-detail-modal');
            if (modal) {
                modal.addEventListener('click', (e) => {
                    if (e.target === modal) {
                        closeDetailModal();
                    }
                });
            }

            // 預設渲染版面與可讀性技能樹
            setCategoryFilter('layout', document.querySelector('.skill-tab'));
        });

        function setCategoryFilter(cat, btn) {
            currentCategory = cat;
            document.querySelectorAll('.skill-tab').forEach(t => t.classList.remove('active'));
            if (btn) btn.classList.add('active');
            renderTree();
        }

        // 渲染技能樹與 SVG 連線
        function renderTree() {
            const canvasArea = document.getElementById('tree-canvas-area');
            const svg = document.getElementById('tree-svg');
            const bg = document.getElementById('tree-grid-bg');
            const searchVal = document.getElementById('skill-search').value.toLowerCase();
            
            const treeCfg = TreeStructures[currentCategory];
            if (!treeCfg) return;

            // 1. 調整畫布尺寸適應層級數量
            const totalTiers = treeCfg.tiers.length;
            const tierWidth = (currentCategory === 'calc') ? 170 : 200;
            const canvasWidth = totalTiers * tierWidth + 80;
            canvasArea.style.width = `${canvasWidth}px`;
            bg.style.width = `${canvasWidth}px`;
            
            // 動態計算高度防止底部節點卡片被裁切
            const maxY = Math.max(...treeCfg.nodes.map(n => n.y));
            const canvasHeight = Math.max(340, maxY + 75);
            canvasArea.style.height = `${canvasHeight}px`;

            // 2. 渲染背景 Tier 分欄
            bg.innerHTML = '';
            for(let i=0; i<totalTiers; i++) {
                const col = document.createElement('div');
                col.className = 'tree-grid-col';
                col.style.width = `${tierWidth}px`;
                col.style.flex = 'none';
                col.innerHTML = `<span class="tree-grid-col-title">${treeCfg.tiers[i]}</span>`;
                bg.appendChild(col);
            }

            // 3. 清理舊卡片 (保留 SVG)
            canvasArea.querySelectorAll('.tree-node-card').forEach(n => n.remove());
            svg.innerHTML = '';

            const nodeWidth = 120;
            const nodeHeight = 52;

            // 4. 繪製卡片節點
            treeCfg.nodes.forEach(node => {
                const s = allSkillDefs[node.id];
                const isUnlocked = unlockedSkills.includes(node.id);
                
                // 搜尋過濾條件
                let matchesSearch = true;
                if (searchVal) {
                    matchesSearch = s && (s.n.toLowerCase().includes(searchVal) || (s.d && s.d.toLowerCase().includes(searchVal)) || (s.s && s.s.toLowerCase().includes(searchVal)));
                }

                const card = document.createElement('div');
                card.className = `tree-node-card ${isUnlocked ? 'unlocked' : 'locked'}`;
                card.id = `node-${node.id}`;
                card.style.left = `${node.x}px`;
                card.style.top = `${node.y}px`;

                card.innerHTML = `
                    <div class="node-name-label">${isUnlocked ? (s ? s.n : node.id) : '未解鎖禁術'}</div>
                    <div class="node-badge">${isUnlocked ? '已掌握' : ''}</div>
                    <div class="node-lock-icon">🔒</div>
                `;

                if (matchesSearch === false) {
                    card.style.opacity = '0.15';
                }

                // 點擊事件：載入詳情
                card.onclick = () => selectNode(node.id, treeCfg, true);
                
                // 懸停高亮上下游依賴關係
                card.onmouseenter = () => highlightPaths(node.id, treeCfg);
                card.onmouseleave = () => resetPaths();

                canvasArea.appendChild(card);
            });

            // 5. 繪製 SVG 貝茲連線
            treeCfg.connections.forEach(conn => {
                const fromNode = treeCfg.nodes.find(n => n.id === conn.from);
                const toNode = treeCfg.nodes.find(n => n.id === conn.to);
                if (!fromNode || !toNode) return;

                const isFromUnlocked = unlockedSkills.includes(conn.from);
                const isToUnlocked = unlockedSkills.includes(conn.to);
                const isLinkUnlocked = isFromUnlocked && isToUnlocked;

                const startX = fromNode.x + nodeWidth;
                const startY = fromNode.y + nodeHeight / 2;
                const endX = toNode.x;
                const endY = toNode.y + nodeHeight / 2;
                const dx = Math.abs(endX - startX) * 0.45;

                // 繪製二次貝茲曲線
                const pathStr = `M ${startX} ${startY} C ${startX + dx} ${startY}, ${endX - dx} ${endY}, ${endX} ${endY}`;

                const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
                path.setAttribute('d', pathStr);
                path.setAttribute('class', `tree-link ${isLinkUnlocked ? 'unlocked' : 'locked'}`);
                path.setAttribute('id', `link-${conn.from}-${conn.to}`);
                path.dataset.from = conn.from;
                path.dataset.to = conn.to;

                svg.appendChild(path);
            });

            // 預設點選第一個節點 (非手動點擊，不彈出視窗)
            if (treeCfg.nodes.length > 0) {
                selectNode(treeCfg.nodes[0].id, treeCfg, false);
            }
        }

        // 高亮上游與下游依賴鏈 (Make hierarchy useful!)
        function highlightPaths(nodeId, config) {
            const upstreams = new Set();
            const downstreams = new Set();

            // 遞迴尋找上游依賴
            function findUpstreams(curr) {
                config.connections.forEach(conn => {
                    if (conn.to === curr && !upstreams.has(conn.from)) {
                        upstreams.add(conn.from);
                        const link = document.getElementById(`link-${conn.from}-${curr}`);
                        if (link) link.classList.add('highlight-upstream');
                        findUpstreams(conn.from);
                    }
                });
            }

            // 遞迴尋找下游解鎖
            function findDownstreams(curr) {
                config.connections.forEach(conn => {
                    if (conn.from === curr && !downstreams.has(conn.to)) {
                        downstreams.add(conn.to);
                        const link = document.getElementById(`link-${curr}-${conn.to}`);
                        if (link) link.classList.add('highlight-downstream');
                        findDownstreams(conn.to);
                    }
                });
            }

            findUpstreams(nodeId);
            findDownstreams(nodeId);

            // 卡片邊框高亮
            upstreams.forEach(id => {
                const el = document.getElementById(`node-${id}`);
                if (el) el.style.borderColor = '#ffe566';
            });
            downstreams.forEach(id => {
                const el = document.getElementById(`node-${id}`);
                if (el) el.style.borderColor = '#2ed573';
            });
        }

        function resetPaths() {
            document.querySelectorAll('.tree-link').forEach(l => {
                l.classList.remove('highlight-upstream', 'highlight-downstream');
            });
            document.querySelectorAll('.tree-node-card').forEach(c => {
                c.style.borderColor = ''; // 還原樣式
            });
        }

        // 選擇節點載入彈窗面板，包含技能脈絡說明
        function selectNode(id, config, isManualClick = false) {
            document.querySelectorAll('.tree-node-card').forEach(n => n.classList.remove('active'));
            const activeCard = document.getElementById(`node-${id}`);
            if (activeCard) activeCard.classList.add('active');

            const s = allSkillDefs[id];
            const isUnlocked = unlockedSkills.includes(id);
            const detailPanel = document.getElementById('s-detail-panel');

            const catStyles = {
                'layout': { color: '#1c72cd', name: '版面與可讀性' },
                'query': { color: '#0d8a66', name: '搜尋與檢索' },
                'entry': { color: '#c07a00', name: '輸入與防錯' },
                'calc': { color: '#d32f2f', name: '計算與統計分析' }
            };

            const style = catStyles[currentCategory] || { color: '#888', name: '未知' };

            if (!s) {
                detailPanel.innerHTML = `<div class="locked-panel"><div class="locked-icon">📖</div><h3>未定義技能</h3></div>`;
                return;
            }

            if (isUnlocked) {
                // 痛點與說明
                const painText = s.pain || "表格向下延伸或數據過多時，難以肉眼直觀分析資料。";
                const effectText = s.d || "發動魔法後將解決數據痛點。";
                
                // 處理操作路徑的鍵盤樣式括號標記
                const formatPath = (pathStr) => {
                    if (!pathStr) return "";
                    return pathStr.replace(/Ctrl\s*\+\s*H/g, '<kbd>Ctrl</kbd> + <kbd>H</kbd>')
                                  .replace(/Ctrl\s*\+\s*F/g, '<kbd>Ctrl</kbd> + <kbd>F</kbd>')
                                  .replace(/Ctrl\s*\+\s*;/g, '<kbd>Ctrl</kbd> + <kbd>;</kbd>')
                                  .replace(/Alt\s*\+\s*=/g, '<kbd>Alt</kbd> + <kbd>=</kbd>')
                                  .replace(/Ctrl/g, '<kbd>Ctrl</kbd>')
                                  .replace(/Shift/g, '<kbd>Shift</kbd>')
                                  .replace(/Alt/g, '<kbd>Alt</kbd>')
                                  .replace(/F4/g, '<kbd>F4</kbd>')
                                  .replace(/F5/g, '<kbd>F5</kbd>');
                };
                const formattedPath = formatPath(s.s);
                const cielTip = CielTipsRegistry[id] || "選取正確的表格儲存格再點擊發動，這是一切操作的鐵律！";

                // 3. 【技能脈絡 (Skill Context)】- 查找前置與後續
                const parentIds = s.parents || [];
                const childIds = [];
                config.connections.forEach(conn => {
                    if (conn.from === id) childIds.push(conn.to);
                });

                let contextHtml = '';
                if (parentIds.length > 0 || childIds.length > 0) {
                    contextHtml = `<div class="detail-section skill-context-box">
                        <h4>🔗 技能脈絡關係</h4>`;
                    
                    if (parentIds.length > 0) {
                        const parentNames = parentIds.map(pid => {
                            const ps = allSkillDefs[pid];
                            return `<span class="context-link" onclick="jumpToNode('${pid}')">${ps ? ps.n : pid}</span>`;
                        }).join(', ');
                        contextHtml += `<p style="margin-bottom:8px">前置依賴：基於你已掌握的 ${parentNames}，才能順利施展本項操作。</p>`;
                    }
                    
                    if (childIds.length > 0) {
                        const childNames = childIds.map(cid => {
                            const cs = allSkillDefs[cid];
                            return `<span class="context-link" onclick="jumpToNode('${cid}')">${cs ? cs.n : cid}</span>`;
                        }).join(', ');
                        contextHtml += `<p>解鎖衍生：掌握本項後，你將能解鎖學習更強大的 ${childNames}！</p>`;
                    }
                    
                    contextHtml += `</div>`;
                }

                detailPanel.innerHTML = `
                    <div class="detail-header">
                        <div class="detail-icon" style="background: ${style.color}">
                            ${currentCategory === 'layout' ? '📦' : (currentCategory === 'query' ? '🔍' : (currentCategory === 'entry' ? '⚡' : '🧮'))}
                        </div>
                        <div class="detail-title">
                            <h2>${s.n}</h2>
                            <span class="detail-badge" style="background: ${style.color}">${style.name}</span>
                        </div>
                    </div>
                    
                    <div class="detail-body">
                        <div class="detail-section pain-point">
                            <h4>💔 遇見的麻煩 (Pain Point)</h4>
                            <p>${painText}</p>
                        </div>
                        
                        <div class="detail-section effect">
                            <h4>✨ 施展路徑 (Action Path)</h4>
                            <p>${effectText}</p>
                            <div class="spell-shortcut">路徑：${formattedPath}</div>
                        </div>

                        <div class="detail-section ciel-tips">
                            <h4>🧚 賽爾的生存提示 (Ciel's Tips)</h4>
                            <p>「${cielTip}」</p>
                        </div>

                        ${contextHtml}
                    </div>

                    <div class="detail-footer">
                        <button class="review-btn" onclick="triggerCrossPageReplay('${id}')">
                            🎬 重溫精靈教學
                        </button>
                    </div>
                `;
            } else {
                detailPanel.innerHTML = `
                    <div class="locked-panel">
                        <div class="locked-icon">🔒</div>
                        <h3>未領悟的禁術</h3>
                        <p>這項能力需要你在驛站冒險中，進一步處理更多混亂 of 數據委託，或完成前置技能的修煉後解鎖！</p>
                    </div>
                `;
            }

            // 手動點擊時，彈出詳情視窗
            if (isManualClick) {
                const modal = document.getElementById('s-detail-modal');
                if (modal) modal.style.display = 'flex';
            }
        }

        function closeDetailModal() {
            const modal = document.getElementById('s-detail-modal');
            if (modal) modal.style.display = 'none';
        }

        // 跨頁跳轉技能樹中的節點並點選 (Make hierarchy useful!)
        function jumpToNode(nodeId) {
            // 尋找 nodeId 所在的類別
            let targetCat = null;
            Object.keys(TreeStructures).forEach(cat => {
                const hasNode = TreeStructures[cat].nodes.some(n => n.id === nodeId);
                if (hasNode) targetCat = cat;
            });

            if (targetCat) {
                if (targetCat !== currentCategory) {
                    const tabBtn = document.querySelector(`.skill-tab[onclick*="'${targetCat}'"]`);
                    setCategoryFilter(targetCat, tabBtn);
                }
                
                // 點擊並滾動至該節點
                setTimeout(() => {
                    const card = document.getElementById(`node-${nodeId}`);
                    if (card) {
                        card.click();
                        // 滾動 viewport 到中央
                        const viewport = document.getElementById('tree-viewport');
                        const xPos = parseInt(card.style.left) - viewport.clientWidth / 2 + card.clientWidth / 2;
                        viewport.scrollTo({ left: Math.max(0, xPos), behavior: 'smooth' });
                    }
                }, 100);
            }
        }

        // 回看模擬器關卡重播
        function triggerCrossPageReplay(skillId) {
            window.location.href = `game.html?replaySkill=${encodeURIComponent(skillId)}`;
        }
    </script>
</body>
</html>
