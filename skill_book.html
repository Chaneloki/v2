<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>試算表禁術大全 - 實戰魔導書</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        /* 針對獨立頁面的特殊樣式覆蓋 */
        body {
            margin: 0; padding: 0;
            background: radial-gradient(circle at center, #1e1e2e 0%, #0b0b14 100%);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100vh; overflow: hidden;
            font-family: 'Inter', sans-serif;
        }
        
        .standalone-grimoire {
            width: 95vw !important;
            height: 90vh !important;
            max-width: 1400px !important;
            box-shadow: 0 30px 60px rgba(0,0,0,0.6) !important;
            border: 2px solid rgba(255, 215, 0, 0.3);
        }

        .return-btn {
            position: absolute; top: 20px; right: 30px;
            padding: 10px 20px; background: rgba(255, 255, 255, 0.1);
            color: #ffd700; border: 1px solid #ffd700; border-radius: 20px;
            font-weight: bold; cursor: pointer; text-decoration: none;
            transition: all 0.2s; z-index: 100;
        }
        .return-btn:hover { background: #ffd700; color: #000; }
        
        /* 修正因為沒有 #s-modal 導致無法生效的按鈕樣式 */
        .grimoire-close-btn { display: none; }
    </style>
</head>
<body>

    <a href="index.html" class="return-btn">🔙 返回遊戲世界</a>

    <div class="grimoire-layout standalone-grimoire" id="s-card">
        <div class="grimoire-left">
            <div id="s-header">
                <h3>📖 實戰魔導書 (Skill Grimoire)</h3>
                <p class="grimoire-subtitle">點擊你想解決的問題，尋找對應的試算表禁術</p>
                <div id="progress-text" style="margin-top: 5px; font-weight: bold; color: #2196f3;"></div>
            </div>
            <div id="s-tabs" class="grimoire-tabs">
                <button class="skill-tab active" onclick="setSkillFilter('all', this)">
                    <div class="tab-icon">✨</div>
                    <div class="tab-text">全部禁術</div>
                </button>
                <button class="skill-tab" onclick="setSkillFilter('search_move', this)">
                    <div class="tab-icon">🔍</div>
                    <div class="tab-text">找資料與移動<br><span>(表太長找不到時)</span></div>
                </button>
                <button class="skill-tab" onclick="setSkillFilter('org_format', this)">
                    <div class="tab-icon">🧹</div>
                    <div class="tab-text">整理與排版<br><span>(版面太亂時)</span></div>
                </button>
                <button class="skill-tab" onclick="setSkillFilter('fast_input', this)">
                    <div class="tab-icon">⚡</div>
                    <div class="tab-text">快速輸入<br><span>(不想手動打字時)</span></div>
                </button>
                <button class="skill-tab" onclick="setSkillFilter('calc_analyze', this)">
                    <div class="tab-icon">🧮</div>
                    <div class="tab-text">運算與分析<br><span>(需要算錢統計時)</span></div>
                </button>
            </div>
            <div id="s-search-box">
                <input type="text" id="skill-search" placeholder="輸入關鍵字或禁術名稱..." oninput="renderSkillList()">
            </div>
            <div id="s-list" class="grimoire-list">
                <!-- 技能卡片由 JS 動態生成 -->
            </div>
        </div>
        <div class="grimoire-right" id="s-detail-panel">
            <!-- 詳細內容由 JS 動態生成 -->
        </div>
    </div>

    <!-- 載入所有章節的技能定義 -->
    <script src="chapter/ch1.js"></script>
    <script src="chapter/ch1_5.js"></script>
    <script src="chapter/ch2.js"></script>
    <script src="chapter/ch2.5.js"></script>
    <script src="chapter/ch3.js"></script>
    <script src="chapter/ch3.5.js"></script>
    <script src="chapter/ch4.js"></script>
    <script src="chapter/ch4.5.js"></script>
    <script src="chapter/ch5.js"></script>
    <script src="chapter/ch5.5.js"></script>
    <script src="chapter/ch6.js"></script>
    <script src="chapter/ch6.5.js"></script>
    <script src="chapter/ch7.js"></script>
    <script src="chapter/ch7.5.js"></script>
    <script src="chapter/ch8.js"></script>

    <script>
        let currentSkillFilter = 'all';
        let unlockedSkills = [];
        let allSkillDefs = {};

        document.addEventListener("DOMContentLoaded", () => {
            // 1. 收集所有技能
            if (window.V2_CHAPTERS) {
                const sortedChapterIds = Object.keys(window.V2_CHAPTERS).sort((a, b) => parseInt(a) - parseInt(b));
                sortedChapterIds.forEach(chId => {
                    const ch = window.V2_CHAPTERS[chId];
                    if (ch && ch.skillDefs) {
                        Object.assign(allSkillDefs, ch.skillDefs);
                    }
                });
            }

            // 2. 從 localStorage 讀取解鎖進度 (支援新的 V2 meta 結構)
            const metaRaw = localStorage.getItem('magic_excel_v2_meta');
            if (metaRaw) {
                try {
                    const meta = JSON.parse(metaRaw);
                    // 取得最近一次遊玩的存檔槽
                    const lastSlot = meta.lastPlayedSlot || 'auto';
                    const saveKey = lastSlot === 'auto' ? 'magic_excel_v2_save' : `magic_excel_v2_save_${lastSlot}`;
                    const saveRaw = localStorage.getItem(saveKey);
                    if (saveRaw) {
                        const saveData = JSON.parse(saveRaw);
                        if (saveData.unlockedSkills) {
                            unlockedSkills = saveData.unlockedSkills;
                        }
                    }
                } catch(e) { console.error("Error loading save:", e); }
            }

            // Fallback (如果沒有 meta)
            if (unlockedSkills.length === 0) {
                ['auto', 'manual_1', 'manual_2'].forEach(slot => {
                    const key = slot === 'auto' ? 'magic_excel_v2_save' : `magic_excel_v2_save_${slot}`;
                    const raw = localStorage.getItem(key);
                    if (raw) {
                        try {
                            const data = JSON.parse(raw);
                            if (data.unlockedSkills && data.unlockedSkills.length > unlockedSkills.length) {
                                unlockedSkills = data.unlockedSkills;
                            }
                        } catch(e) {}
                    }
                });
            }

            document.getElementById('progress-text').innerText = `目前已領悟：${unlockedSkills.length} / ${Object.keys(allSkillDefs).length} 項禁術`;

            renderSkillList();
        });

        function setSkillFilter(cat, btn) {
            currentSkillFilter = cat;
            document.querySelectorAll('.skill-tab').forEach(t => t.classList.remove('active'));
            if (btn) btn.classList.add('active');
            renderSkillList();
        }

        function renderSkillList() {
            const container = document.getElementById('s-list');
            const detailPanel = document.getElementById('s-detail-panel');
            const searchVal = document.getElementById('skill-search').value.toLowerCase();
            
            const getMappedCategory = (skillId, originalCat) => {
                const fastInputSkills = ['AUTOFILL', 'VALIDATION', 'insert_row', 'insert_col'];
                if (fastInputSkills.includes(skillId)) return 'fast_input';
                if (['move', 'view'].includes(originalCat)) return 'search_move';
                if (['org', 'insert'].includes(originalCat)) return 'org_format';
                if (['data', 'formula', 'logic'].includes(originalCat)) return 'calc_analyze';
                return 'search_move';
            };

            const catStyles = {
                'search_move': { color: '#10ac84', icon: '🔍', name: '找資料與移動' },
                'org_format': { color: '#2e86de', icon: '🧹', name: '整理與排版' },
                'fast_input': { color: '#feca57', icon: '⚡', name: '快速輸入' },
                'calc_analyze': { color: '#ee5253', icon: '🧮', name: '運算與分析' }
            };

            const allSkillIds = Object.keys(allSkillDefs);
            const filteredIds = allSkillIds.filter(id => {
                const s = allSkillDefs[id];
                if (!s) return false;
                const mappedCat = getMappedCategory(id, s.cat);
                const matchCat = (currentSkillFilter === 'all' || mappedCat === currentSkillFilter);
                const matchSearch = (s.n.toLowerCase().includes(searchVal) || (s.d && s.d.toLowerCase().includes(searchVal)));
                return matchCat && matchSearch;
            });

            container.innerHTML = '';

            if (filteredIds.length === 0) {
                container.innerHTML = '<div class="empty-grimoire">找不到符合的禁術...</div>';
                return;
            }

            filteredIds.forEach(id => {
                const s = allSkillDefs[id];
                const isUnlocked = unlockedSkills.includes(id);
                const mappedCat = getMappedCategory(id, s.cat);
                const style = catStyles[mappedCat];

                const node = document.createElement('div');
                node.className = `grimoire-card ${isUnlocked ? 'unlocked' : 'locked'}`;
                
                node.innerHTML = `
                    <div class="card-icon" style="background: ${isUnlocked ? style.color : '#95a5a6'};">
                        ${isUnlocked ? (s.icon ? `<img src="${s.icon}">` : style.icon) : '🔒'}
                    </div>
                    <div class="card-info">
                        <div class="card-name">${isUnlocked ? s.n : '未知禁術'}</div>
                        <div class="card-cat" style="color: ${isUnlocked ? style.color : '#999'}">${style.name}</div>
                    </div>
                `;

                node.onclick = () => {
                    container.querySelectorAll('.grimoire-card').forEach(n => n.classList.remove('active'));
                    node.classList.add('active');

                    if (isUnlocked) {
                        const painPoint = s.pain || `當你在龐大的試算表中感到迷失，或是遇到需要大量人工處理的繁瑣工作時...`;
                        const effect = s.d || `發動此魔法，將自動為你處理眼前的難題。`;
                        const shortcutStr = s.s ? `<div class="spell-shortcut">詠唱咒語：<kbd>${s.s}</kbd></div>` : '';

                        detailPanel.innerHTML = `
                            <div class="detail-header">
                                <div class="detail-icon" style="background: ${style.color}">
                                    ${s.icon ? `<img src="${s.icon}">` : style.icon}
                                </div>
                                <div class="detail-title">
                                    <h2>${s.n}</h2>
                                    <span class="detail-badge" style="background: ${style.color}">${style.name}</span>
                                </div>
                            </div>
                            
                            <div class="detail-body">
                                <div class="detail-section pain-point">
                                    <h4>💔 常見災難 (Pain Point)</h4>
                                    <p>${painPoint}</p>
                                </div>
                                <div class="detail-section effect">
                                    <h4>✨ 救贖效果 (Effect)</h4>
                                    <p>${effect}</p>
                                    ${shortcutStr}
                                </div>
                            </div>
                        `;
                    } else {
                        detailPanel.innerHTML = `
                            <div class="locked-panel">
                                <div class="locked-icon">🔒</div>
                                <h3>尚未領悟的禁術</h3>
                                <p>繼續推進主線劇情，或在公會完成特定委託來解鎖這項強大能力吧！</p>
                            </div>
                        `;
                    }
                };

                container.appendChild(node);
            });
            
            if (container.firstElementChild) {
                container.firstElementChild.click();
            }
        }

        // 跨頁面回顧機制
        function triggerCrossPageReplay(skillId) {
            // 跳轉至 index.html 並帶上 query 參數
            window.location.href = `index.html?replaySkill=${skillId}`;
        }
    </script>
</body>
</html>
